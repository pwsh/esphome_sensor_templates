# @template: generic_switch
# @title: Generic Switch (virtual flag)
# @category: inputs
# @description: A virtual template switch, surfaced in HA as a config control. Use it as an on/off flag to gate automations - read it via id(...).state or attach actions with !extend.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: switch "Flag"
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_switch_id [st_generic_switch]: Entity id - MUST be overridden on every extra include (see notes)
# @var st_switch_name [Flag]: Entity name (after st_name_prefix)
# @var st_switch_restore_mode [RESTORE_DEFAULT_OFF]: Boot behavior - see enum in notes
# @note: MULTI-INSTANCE - include this file more than once to get several switches. Each extra include MUST override BOTH st_switch_id AND st_switch_name; duplicate ids are a hard "ID redefined!" compile error.
# @note: restore_mode enum: RESTORE_DEFAULT_OFF, RESTORE_DEFAULT_ON, ALWAYS_OFF, ALWAYS_ON, RESTORE_INVERTED_DEFAULT_OFF, RESTORE_INVERTED_DEFAULT_ON, DISABLED. RESTORE_* variants read the last state from NVS (one flash write per change); ALWAYS_* never persist.
# @note: This is a virtual flag - it drives nothing on its own. Read id(st_generic_switch).state in a lambda, or attach on_turn_on/on_turn_off actions via "switch: - id: !extend st_generic_switch".

defaults:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_switch_id: st_generic_switch
  st_switch_name: "Flag"
  st_switch_restore_mode: RESTORE_DEFAULT_OFF

switch:
  - platform: template
    # The id itself is a var so the file can be included multiple times.
    id: ${st_switch_id}
    name: "${st_name_prefix}${st_switch_name}"
    # optimistic: the switch tracks its own commanded state (no output to drive).
    optimistic: true
    restore_mode: ${st_switch_restore_mode}
    entity_category: config
    icon: mdi:toggle-switch-outline
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
