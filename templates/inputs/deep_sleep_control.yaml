# @template: deep_sleep_control
# @title: HA-Controlled Deep Sleep
# @category: inputs
# @description: The classic Home Assistant-controlled deep sleep pattern. The device sleeps between runs but honors an HA input_boolean that can hold it awake for OTA/config.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: api, HA input_boolean helper named by st_prevent_sleep_entity
# @entities: none (deep_sleep component + hidden binary_sensor)
# @var st_sleep_duration [10min]: How long the device stays asleep between runs
# @var st_run_duration [60s]: How long the device stays awake each run before sleeping
# @var st_prevent_sleep_entity [input_boolean.prevent_deep_sleep]: HA entity that, when ON, prevents sleep
# @note: SINGLE-INSTANCE - this file uses fixed ids (st_deep_sleep, st_prevent_sleep). Include it exactly ONCE.
# @note: Requires an active api: connection - the homeassistant binary_sensor platform reads the toggle over the API.
# @note: The device can only see the toggle WHILE AWAKE. Flip the HA input_boolean ON *before* the next wake so the device catches it during its brief run_duration window (that window is your OTA opportunity).
# @note: When the toggle goes back OFF (on_release), deep_sleep.allow re-arms sleep and restarts the run_duration timer, so the device stays awake for a fresh run_duration before sleeping again.
# @note: Create the helper in HA: Settings > Devices & Services > Helpers > Toggle, matching st_prevent_sleep_entity.

defaults:
  st_sleep_duration: 10min
  st_run_duration: 60s
  st_prevent_sleep_entity: input_boolean.prevent_deep_sleep

deep_sleep:
  id: st_deep_sleep
  sleep_duration: ${st_sleep_duration}
  run_duration: ${st_run_duration}

binary_sensor:
  # Always internal: this is a control input from HA, not a user-facing entity.
  - platform: homeassistant
    id: st_prevent_sleep
    entity_id: ${st_prevent_sleep_entity}
    internal: true
    # Toggle ON in HA -> hold the device awake.
    on_press:
      then:
        - deep_sleep.prevent: st_deep_sleep
    # Toggle OFF in HA -> re-allow sleep and restart the run_duration timer.
    on_release:
      then:
        - deep_sleep.allow: st_deep_sleep
