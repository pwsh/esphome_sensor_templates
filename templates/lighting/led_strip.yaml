# @template: led_strip
# @title: Addressable RGB LED Strip (RMT)
# @category: lighting
# @description: A WS2812-family addressable RGB strip driven by the ESP32 RMT peripheral. Ships a conservative, USB-safe brightness cap and a curated set of addressable effects.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: light "LED Strip"
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_led_strip_id [st_led_strip]: Entity id - MUST be overridden on every extra include (see notes)
# @var st_led_strip_name [LED Strip]: Entity name (after st_name_prefix)
# @var st_led_strip_pin [(required)]: Data-line GPIO the strip is wired to
# @var st_num_leds [30]: Number of LEDs on the strip
# @var st_led_chipset [WS2812] {WS2812|WS2811|SK6812|APA106|SM16703}: LED controller chipset
# @var st_rgb_order [GRB] {RGB|RBG|GRB|GBR|BRG|BGR}: Byte order the chipset expects (see notes)
# @var st_power_limit [0.5]: 0.0-1.0 per-channel brightness cap applied via color_correct (USB-safe default)
# @var st_light_restore_mode [ALWAYS_OFF] {RESTORE_DEFAULT_OFF|RESTORE_DEFAULT_ON|ALWAYS_OFF|ALWAYS_ON|RESTORE_INVERTED_DEFAULT_OFF|RESTORE_INVERTED_DEFAULT_ON}: Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)
# @note: MULTI-INSTANCE - include this file more than once to get several strips. Each extra include MUST override st_led_strip_id, st_led_strip_name AND st_led_strip_pin; duplicate ids or shared data pins are errors.
# @note: POWER CAP - a WS2812-class LED draws ~60 mA at full white. A 500 mA USB budget minus ~150 mA for the ESP32 leaves headroom for only ~5-8 LEDs at 100%. st_power_limit defaults to 0.5 (color_correct halves every channel). Raise it toward 1.0 ONLY when the strip has its own injected power supply.
# @note: RGB ORDER - the WS2812/SK6812/APA106 family is GRB; WS2811 strips are commonly RGB. If red and green look swapped, flip st_rgb_order.
# @note: Effects are compiled in but cost nothing until activated from HA - the curated list below is free to keep.
# @note: rmt_symbols / use_dma are optional RMT tuning knobs; the defaults are fine for typical strips on ESP-IDF, so they are omitted here.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"

defaults:
  st_led_strip_id: st_led_strip
  st_led_strip_name: "LED Strip"
  st_num_leds: "30"
  st_led_chipset: WS2812
  st_rgb_order: GRB
  st_power_limit: "0.5"
  st_light_restore_mode: ALWAYS_OFF

light:
  - platform: esp32_rmt_led_strip
    # id/name/pin are vars so the file can be included multiple times.
    id: ${st_led_strip_id}
    name: "${st_name_prefix}${st_led_strip_name}"
    pin: ${st_led_strip_pin}
    num_leds: ${st_num_leds}
    chipset: ${st_led_chipset}
    rgb_order: ${st_rgb_order}
    restore_mode: ${st_light_restore_mode}
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
    # THE power limiter: scales every channel by st_power_limit so full white
    # can never exceed the USB current budget. 3 entries = R, G, B.
    # Block-list form (not [a, b, c]) because a ${...} at the start of a flow
    # sequence is misread as a YAML flow map by the parser.
    color_correct:
      - ${st_power_limit}
      - ${st_power_limit}
      - ${st_power_limit}
    effects:
      - addressable_rainbow:
          name: Rainbow
          speed: 10
          width: 50
      - addressable_color_wipe:
          name: Color Wipe
          add_led_interval: 100ms
          reverse: false
      - addressable_scan:
          name: Scan
          move_interval: 100ms
          scan_width: 1
      - addressable_twinkle:
          name: Twinkle
          twinkle_probability: 5%
          progress_interval: 32ms
      - addressable_random_twinkle:
          name: Random Twinkle
          twinkle_probability: 5%
          progress_interval: 32ms
      - addressable_fireworks:
          name: Fireworks
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: false
          fade_out_rate: 120
      - addressable_flicker:
          name: Flicker
          update_interval: 16ms
          intensity: 5%
