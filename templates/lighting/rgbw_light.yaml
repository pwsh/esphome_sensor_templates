# @template: rgbw_light
# @title: RGBW Light (4x LEDC PWM)
# @category: lighting
# @description: An analog RGBW light built from four ESP32 LEDC PWM outputs (R, G, B and a dedicated white channel). Per-output duty caps plus color interlock keep it inside the USB power budget by default.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: light "RGBW Light"
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_rgbw_light_id [st_rgbw_light]: Entity id - MUST be overridden on every extra include (see notes)
# @var st_rgbw_light_name [RGBW Light]: Entity name (after st_name_prefix)
# @var st_rgbw_pin_r [(required)]: GPIO driving the RED channel
# @var st_rgbw_pin_g [(required)]: GPIO driving the GREEN channel
# @var st_rgbw_pin_b [(required)]: GPIO driving the BLUE channel
# @var st_rgbw_pin_w [(required)]: GPIO driving the WHITE channel
# @var st_rgbw_frequency [1000Hz]: LEDC PWM frequency for all four channels (ESP-IDF LEDC default is 1kHz)
# @var st_rgbw_max_power [0.8]: 0.0-1.0 duty-cycle cap applied to all four outputs - THE power limiter
# @var st_rgbw_color_interlock [true]: Prevent RGB and W being on at once (halves worst-case current) - C++ literal "true"/"false"
# @var st_rgbw_restore_mode [ALWAYS_OFF] {RESTORE_DEFAULT_OFF|RESTORE_DEFAULT_ON|ALWAYS_OFF|ALWAYS_ON|RESTORE_INVERTED_DEFAULT_OFF|RESTORE_INVERTED_DEFAULT_ON}: Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)
# @note: MULTI-INSTANCE - include this file more than once to get several RGBW lights. Each extra include MUST override st_rgbw_light_id, st_rgbw_light_name AND all four pins; duplicate ids or shared pins are errors. Output ids are derived as ${st_rgbw_light_id}_r/_g/_b/_w, so overriding the light id keeps them unique.
# @note: POWER CAP - st_rgbw_max_power caps the duty cycle on every channel via the output max_power (0.8 = 80%). st_rgbw_color_interlock defaults to true: it forbids the RGB and white channels being lit simultaneously, roughly halving the worst-case current draw - an important part of the USB power story. Raise the cap toward 1.0 only with an external supply.
# @note: ESPHome's own default for color_interlock is false; this template flips it to true on purpose for power safety. Set it back to "false" if you want RGB+W mixing and have the supply for it.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"

defaults:
  st_rgbw_light_id: st_rgbw_light
  st_rgbw_light_name: "RGBW Light"
  st_rgbw_frequency: 1000Hz
  st_rgbw_max_power: "0.8"
  st_rgbw_color_interlock: "true"
  st_rgbw_restore_mode: ALWAYS_OFF

output:
  - platform: ledc
    id: ${st_rgbw_light_id}_r
    pin: ${st_rgbw_pin_r}
    frequency: ${st_rgbw_frequency}
    max_power: ${st_rgbw_max_power}
  - platform: ledc
    id: ${st_rgbw_light_id}_g
    pin: ${st_rgbw_pin_g}
    frequency: ${st_rgbw_frequency}
    max_power: ${st_rgbw_max_power}
  - platform: ledc
    id: ${st_rgbw_light_id}_b
    pin: ${st_rgbw_pin_b}
    frequency: ${st_rgbw_frequency}
    max_power: ${st_rgbw_max_power}
  - platform: ledc
    id: ${st_rgbw_light_id}_w
    pin: ${st_rgbw_pin_w}
    frequency: ${st_rgbw_frequency}
    max_power: ${st_rgbw_max_power}

light:
  - platform: rgbw
    id: ${st_rgbw_light_id}
    name: "${st_name_prefix}${st_rgbw_light_name}"
    red: ${st_rgbw_light_id}_r
    green: ${st_rgbw_light_id}_g
    blue: ${st_rgbw_light_id}_b
    white: ${st_rgbw_light_id}_w
    color_interlock: ${st_rgbw_color_interlock}
    restore_mode: ${st_rgbw_restore_mode}
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
    effects:
      - random:
          name: Slow Random
          transition_length: 5s
          update_interval: 7s
      - strobe:
          name: Strobe
      - flicker:
          name: Flicker
          alpha: 95%
          intensity: 15%
