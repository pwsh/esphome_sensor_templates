# @template: time_sntp
# @title: SNTP Time
# @category: core
# @description: SNTP time source with configurable server. Provides the time: component other templates (daily_restart, last_boot) require.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: wifi
# @entities: none (time source only)
# @var st_ntp_server [0.pool.ntp.org]: NTP server to sync against
# @note: Timezone is deliberately NOT set here - ESPHome auto-infers it from the build machine. Override per device with "time: - id: !extend st_time_sntp / timezone: Europe/Berlin".
# @note: Do not include together with time_homeassistant.yaml unless you want two time sources.

defaults:
  st_ntp_server: 0.pool.ntp.org

time:
  - platform: sntp
    id: st_time_sntp
    servers:
      - ${st_ntp_server}
    on_time_sync:
      then:
        - logger.log: "Synchronized system clock"
