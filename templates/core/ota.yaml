# @template: ota
# @title: OTA Updates
# @category: core
# @description: Over-the-air update preset (esphome platform) with a password gate and progress logging hooks.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: wifi
# @entities: none (updater preset only)
# @var st_ota_password [(required)]: OTA upload password; pass via vars: { st_ota_password: !secret ota_password }
# @note: Presence of ota: also auto-enables safe_mode. Include safe_mode.yaml only to tune its thresholds.

ota:
  - platform: esphome
    # Required var - no default. Users pass: vars: { st_ota_password: !secret ota_password }
    password: ${st_ota_password}
    on_begin:
      then:
        - logger.log: "OTA start"
    on_progress:
      then:
        - logger.log:
            format: "OTA progress %0.1f%%"
            args: ["x"]
    on_end:
      then:
        - logger.log: "OTA end"
    on_error:
      then:
        - logger.log:
            format: "OTA update error %d"
            args: ["x"]
