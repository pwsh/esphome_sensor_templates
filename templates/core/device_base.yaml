# @template: device_base
# @title: Device Identity
# @category: core
# @description: The esphome: identity block - device name, friendly_name, comment, project metadata and Home Assistant area. Include this INSTEAD of writing your own esphome: name/friendly_name.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: none (device identity preset only)
# @var st_device_name [(required)]: Node name / hostname - lowercase letters, digits and hyphens only, <=24 chars (<=31 without a MAC suffix)
# @var st_friendly_name [(required)]: Human-friendly display name shown in Home Assistant
# @var st_device_comment []: Optional one-line description shown in the ESPHome/HA UI (empty = omitted)
# @var st_project_name [pwsh.esphome_sensor_templates]: Project id in author_name.project_name (namespace.project) format
# @var st_project_version [1.0.0]: Free-form project version string
# @var st_area []: Home Assistant area name for this device as a plain string (empty = no area; see note)
# @note: This file IS your esphome: block. Include it INSTEAD of writing your own esphome: name/friendly_name. Your top-level config must NOT declare esphome: name - put the board under esp32:, and let the whole identity block come from this package (top-level keys deep-merge, so a second esphome: name would clobber this one).
# @note: project.name MUST be author_name.project_name (namespace.project) - a bare word without a dot fails validation. The version is any string.
# @note: area takes a plain string here. For the structured areas/sub-devices form (esphome: area: {id, name} plus a top-level areas:/devices: list) add that at your top level - it deep-merges with this block.

defaults:
  st_device_comment: ""
  st_project_name: pwsh.esphome_sensor_templates
  st_project_version: 1.0.0
  st_area: ""

esphome:
  # name/friendly_name are required vars - no defaults. The user supplies them
  # via vars: { st_device_name: my-node, st_friendly_name: "My Node" }. This is
  # the whole esphome: identity block, so the top-level config must not set its
  # own esphome: name (that would deep-merge and clobber this one).
  name: ${st_device_name}
  friendly_name: ${st_friendly_name}
  comment: ${st_device_comment}
  area: ${st_area}
  project:
    name: ${st_project_name}
    version: ${st_project_version}
