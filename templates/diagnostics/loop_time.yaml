# @template: loop_time
# @title: Loop Time
# @category: diagnostics
# @description: Reports the main-loop iteration time from the debug component, in milliseconds. Spikes reveal a component that blocks the loop (slow I2C, long lambdas).
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: sensor "Loop Time"
# @var st_update_interval [60s]: How often the debug hub refreshes loop time
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_state_class [measurement]: state_class for the sensor; set "" to opt out of HA long-term statistics
# @note: Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_update_interval: 60s
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_state_class: measurement

# Shared debug hub (merges with other debug-based templates).
debug:
  update_interval: ${st_update_interval}

sensor:
  - platform: debug
    # Reported by the debug component as the measured main-loop latency; a
    # healthy loop stays low, sustained spikes point at a blocking component.
    loop_time:
      id: st_loop_time
      name: "${st_name_prefix}Loop Time"
      unit_of_measurement: ms
      state_class: "${st_state_class}"
      entity_category: diagnostic
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
      icon: mdi:timer-sync-outline
