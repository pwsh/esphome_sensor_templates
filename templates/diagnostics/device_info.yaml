# @template: device_info
# @title: Device Info
# @category: diagnostics
# @description: Exposes the debug component's device text sensors - a one-line hardware/firmware summary (chip model, cores, revision, flash size, ESPHome version) and the last reset reason.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: text_sensor "Device Info"; text_sensor "Reset Reason"
# @var st_update_interval [60s]: How often the debug hub refreshes the text sensors
# @var st_name_prefix []: Prefix prepended to every entity name
# @var st_disabled_by_default [false]: Ship the entities disabled in HA
# @var st_internal [false]: Hide the entities from HA/web entirely
# @note: Prefer this over hand-rolled esp_reset_reason() lambdas - the debug component decodes the reason string for you.
# @note: Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_update_interval: 60s
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"

# Shared debug hub (merges with other debug-based templates).
debug:
  update_interval: ${st_update_interval}

text_sensor:
  - platform: debug
    # device: is the multi-field hardware/firmware summary; reset_reason: is the
    # decoded cause of the last restart (both text - no state_class).
    device:
      id: st_device_info
      name: "${st_name_prefix}Device Info"
      entity_category: diagnostic
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
      icon: mdi:chip
    reset_reason:
      id: st_reset_reason
      name: "${st_name_prefix}Reset Reason"
      entity_category: diagnostic
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
      icon: mdi:restart
