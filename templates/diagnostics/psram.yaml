# @template: psram
# @title: PSRAM Free
# @category: diagnostics
# @description: Reports free PSRAM (SPI RAM) in bytes from the debug component. Confirms that external PSRAM is detected and tracks headroom for buffer-heavy components.
# @platforms: esp32, esp32s2, esp32s3
# @requires: psram
# @entities: sensor "PSRAM Free"
# @var st_update_interval [60s]: How often the debug hub refreshes PSRAM stats
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_state_class [measurement]: state_class for the sensor; set "" to opt out of HA long-term statistics
# @note: ESP32-C3/C6 have no PSRAM interface - this template is limited to esp32/s2/s3. Requires the psram: component configured AND PSRAM hardware present, otherwise the sensor reports 0.
# @note: Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins.

defaults:
  st_update_interval: 60s
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_state_class: measurement

# Shared debug hub (merges with other debug-based templates).
debug:
  update_interval: ${st_update_interval}

sensor:
  - platform: debug
    # Only populated when the psram: component is configured and the module
    # actually has SPI RAM - otherwise reports 0.
    psram:
      id: st_psram_free
      name: "${st_name_prefix}PSRAM Free"
      unit_of_measurement: B
      device_class: data_size
      state_class: "${st_state_class}"
      entity_category: diagnostic
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
      icon: mdi:memory
