# @template: last_boot
# @title: Last Boot
# @category: diagnostics
# @description: Publishes the wall-clock timestamp of the last boot as a timestamp sensor. HA renders it as a relative "last seen"-style time.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: time
# @entities: sensor "Last Boot"
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @note: Needs any time: component (e.g. core/time_sntp.yaml). Publishes once after the clock syncs; there is no update_interval (that only applies to type: seconds) and no state_class (device_class timestamp handles it).

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"

sensor:
  - platform: uptime
    # type: timestamp computes boot wall-clock time once the clock is valid and
    # republishes only if it drifts; device_class defaults to timestamp - leave it.
    type: timestamp
    id: st_last_boot
    name: "${st_name_prefix}Last Boot"
    device_class: timestamp
    icon: mdi:clock-start
    entity_category: diagnostic
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
