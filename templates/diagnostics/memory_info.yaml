# @template: memory_info
# @title: Memory Info
# @category: diagnostics
# @description: Reports total installed internal RAM and total PSRAM in KiB, read from the heap capability registry. Confirms how much DRAM and external SPI RAM the running build actually sees.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: sensor "RAM Total"; sensor "PSRAM Total"
# @var st_name_prefix []: Prefix prepended to the entity names
# @var st_disabled_by_default [false]: Ship the entities disabled in HA
# @var st_internal [false]: Hide the entities from HA/web entirely
# @note: Static per boot - update_interval is never and both values are published exactly once from on_boot at priority -100 (after sensors are set up).
# @note: No state_class is set - fixed hardware totals are not measurements and need no HA long-term statistics, so they deliberately do NOT honor the ${st_state_class} knob.
# @note: PSRAM Total reports 0 on boards without external SPI RAM (e.g. ESP32-C3/C6). It reads the heap capability registry (MALLOC_CAP_SPIRAM) directly and does NOT require the psram: component to be configured.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"

esphome:
  # esp_heap_caps.h is not pulled into main.cpp by any component, so force-include
  # it for the lambdas below. build_src_flags only affects the project's own src/
  # (main.cpp) and the list concatenates cleanly with flags from other templates.
  platformio_options:
    build_src_flags:
      - "-include esp_heap_caps.h"
  on_boot:
    # priority -100 runs late, after all sensors are set up, so the one-shot
    # component.updates below publish into live entities.
    - priority: -100
      then:
        - component.update: st_ram_total
        - component.update: st_psram_total

sensor:
  - platform: template
    id: st_ram_total
    name: "${st_name_prefix}RAM Total"
    unit_of_measurement: KiB
    device_class: data_size
    accuracy_decimals: 0
    icon: mdi:memory
    entity_category: diagnostic
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
    # Static hardware fact - computed once and pushed from on_boot, never polled.
    update_interval: never
    lambda: |-
      return heap_caps_get_total_size(MALLOC_CAP_INTERNAL) / 1024.0;

  - platform: template
    id: st_psram_total
    name: "${st_name_prefix}PSRAM Total"
    unit_of_measurement: KiB
    device_class: data_size
    accuracy_decimals: 0
    icon: mdi:memory
    entity_category: diagnostic
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
    # Static hardware fact - computed once and pushed from on_boot, never polled.
    # Reports 0 on boards with no PSRAM (registry has no MALLOC_CAP_SPIRAM pool).
    update_interval: never
    lambda: |-
      return heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / 1024.0;
