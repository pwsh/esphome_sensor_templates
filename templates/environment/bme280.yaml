# @template: bme280
# @title: BME280 Temperature / Humidity / Pressure
# @category: environment
# @description: Reads temperature, humidity and barometric pressure from a Bosch BME280 over I2C. Shares the library I2C bus.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: i2c
# @entities: sensor "Temperature"; sensor "Humidity"; sensor "Pressure"
# @var st_update_interval [60s]: How often to sample the sensor
# @var st_name_prefix []: Prefix prepended to every entity name
# @var st_disabled_by_default [false]: Ship the entities disabled in HA
# @var st_internal [false]: Hide the entities from HA/web entirely
# @var st_state_class [measurement]: state_class for all readings; set "" to opt out of HA long-term statistics
# @var st_bme280_i2c_id [st_i2c_bus]: id of the I2C bus to use (from core/i2c.yaml)
# @var st_bme280_address [0x76] {0x76|0x77}: I2C address (0x76 SDO->GND, 0x77 SDO->VCC)
# @note: Requires the shared I2C bus - include core/i2c.yaml. Sub-sensors keep the component default 16x oversampling; override via !extend for lower power.
# @note: A BMP280 (no humidity) is a different chip - use the bmp280_i2c platform instead. A "BME280" that reports 0% humidity is usually a mislabelled BMP280.

# Shared knobs live under substitutions: (not defaults:) so a single
# main-config substitution overrides them across every included template;
# per-include vars: still win for this file alone.
substitutions:
  st_update_interval: 60s
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_state_class: measurement

defaults:
  st_bme280_i2c_id: st_i2c_bus
  st_bme280_address: "0x76"

sensor:
  - platform: bme280_i2c
    i2c_id: ${st_bme280_i2c_id}
    address: ${st_bme280_address}
    update_interval: ${st_update_interval}
    temperature:
      id: st_bme280_temperature
      name: "${st_name_prefix}Temperature"
      device_class: temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      state_class: "${st_state_class}"
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
    humidity:
      id: st_bme280_humidity
      name: "${st_name_prefix}Humidity"
      device_class: humidity
      unit_of_measurement: "%"
      accuracy_decimals: 1
      state_class: "${st_state_class}"
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
    pressure:
      id: st_bme280_pressure
      name: "${st_name_prefix}Pressure"
      device_class: pressure
      unit_of_measurement: hPa
      accuracy_decimals: 1
      state_class: "${st_state_class}"
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
