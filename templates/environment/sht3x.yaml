# @template: sht3x
# @title: SHT3x Temperature & Humidity
# @category: environment
# @description: Reads temperature and humidity from a Sensirion SHT30/SHT31/SHT35 (SHT3x-D) over I2C. Shares the library I2C bus.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: i2c
# @entities: sensor "Temperature"; sensor "Humidity"
# @var st_update_interval [60s]: How often to sample the sensor
# @var st_name_prefix []: Prefix prepended to every entity name
# @var st_disabled_by_default [false]: Ship the entities disabled in HA
# @var st_internal [false]: Hide the entities from HA/web entirely
# @var st_state_class [measurement]: state_class for both readings; set "" to opt out of HA long-term statistics
# @var st_sht3x_i2c_id [st_i2c_bus]: id of the I2C bus to use (from core/i2c.yaml)
# @var st_sht3x_address [0x44] {0x44|0x45}: I2C address (0x44 ADDR->GND, 0x45 ADDR->VCC; SHT85 is 0x44 only)
# @note: Requires the shared I2C bus - include core/i2c.yaml. The onboard heater is off by default; enable it via !extend (heater_enabled: true) only to clear condensation, as it skews readings.

defaults:
  st_update_interval: 60s
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_state_class: measurement
  st_sht3x_i2c_id: st_i2c_bus
  st_sht3x_address: "0x44"

sensor:
  - platform: sht3xd
    i2c_id: ${st_sht3x_i2c_id}
    address: ${st_sht3x_address}
    update_interval: ${st_update_interval}
    temperature:
      id: st_sht3x_temperature
      name: "${st_name_prefix}Temperature"
      device_class: temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      state_class: "${st_state_class}"
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
    humidity:
      id: st_sht3x_humidity
      name: "${st_name_prefix}Humidity"
      device_class: humidity
      unit_of_measurement: "%"
      accuracy_decimals: 1
      state_class: "${st_state_class}"
      disabled_by_default: ${st_disabled_by_default}
      internal: ${st_internal}
