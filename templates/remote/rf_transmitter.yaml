# @template: rf_transmitter
# @title: 433 MHz RF Transmitter (RC Switch)
# @category: remote
# @description: 433 MHz RF transmitter hub (FS1000A / ASK class) plus a demo template button that sends a sample RC Switch code. Learn codes with rf_receiver, then replay them from here.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: button "RF Test"
# @var st_name_prefix []: Prefix prepended to the entity name
# @var st_disabled_by_default [false]: Ship the entity disabled in HA
# @var st_internal [false]: Hide the entity from HA/web entirely
# @var st_rf_tx_pin [(required)]: GPIO driving the transmitter DATA pin
# @var st_rf_tx_id [st_rf_tx]: Base id for the demo button (button id is ${st_rf_tx_id}_test)
# @var st_rf_tx_name [RF Test]: Name of the demo button (after st_name_prefix)
# @var st_rf_test_code [000000000001010100010001]: RC Switch binary code string the demo button transmits
# @var st_rf_test_protocol [1]: RC Switch protocol number for the demo code
# @note: carrier_duty_percent is 100% - the documented value for RF. 433 MHz ASK transmitters have NO subcarrier, so the output must stay on for the whole mark (an IR-style 50% duty would halve the signal). IR transmitters use 50%; see ir_transmitter.yaml.
# @note: The demo button sends an RC Switch raw code via remote_transmitter.transmit_rc_switch_raw (code + protocol). Learn your real codes with rf_receiver.yaml (they print to the log), then set st_rf_test_code / st_rf_test_protocol, or add buttons via !extend using transmit_rc_switch_a/_b/_c/_d for typed dip-switch/button remotes.
# @note: The bare FS1000A needs a 17.3 cm wire antenna and ideally >3.3 V on VCC for real range; many run it off 5 V with the DATA pin still driven from a 3.3 V GPIO.

defaults:
  st_name_prefix: ""
  st_disabled_by_default: "false"
  st_internal: "false"
  st_rf_tx_id: st_rf_tx
  st_rf_tx_name: "RF Test"
  st_rf_test_code: "000000000001010100010001"
  st_rf_test_protocol: "1"

remote_transmitter:
  id: st_rf_transmitter
  pin: ${st_rf_tx_pin}
  # 100% duty for RF: ASK/OOK transmitters carry no subcarrier, the mark must stay fully on.
  carrier_duty_percent: 100%
  # Explicit: the default flipped to non-blocking in 2025.11 and warns when unset.
  non_blocking: true

button:
  - platform: template
    id: ${st_rf_tx_id}_test
    name: "${st_name_prefix}${st_rf_tx_name}"
    entity_category: config
    icon: mdi:remote
    disabled_by_default: ${st_disabled_by_default}
    internal: ${st_internal}
    on_press:
      - remote_transmitter.transmit_rc_switch_raw:
          code: ${st_rf_test_code}
          protocol: ${st_rf_test_protocol}
