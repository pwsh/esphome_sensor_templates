# @template: bluetooth_proxy
# @title: Bluetooth Proxy
# @category: bluetooth
# @description: Turns the device into a Home Assistant Bluetooth proxy, forwarding nearby BLE advertisements (and optionally active GATT connections) to HA over the native API.
# @platforms: esp32, esp32s3, esp32c3, esp32c6
# @requires: api
# @entities: none (proxies BLE devices to Home Assistant)
# @var st_bt_proxy_active [true]: C++ literal "true"/"false" - true allows HA to open active GATT connections through this proxy; false is advertisement-only (passive)
# @var st_bt_proxy_connection_slots [3]: Max simultaneous active BLE connections (1-9; keep <=5 for stability/memory)
# @note: This file does NOT declare esp32_ble_tracker - bluetooth_proxy AUTO-LOADS the BLE tracker for you, so the scanner is enabled automatically with default scan parameters.
# @note: SAFE to also include bluetooth/ble_tracker.yaml if you want to tune scan parameters - the auto-loaded tracker and the explicit esp32_ble_tracker block merge cleanly (verified: no duplicate-component error). Include ble_tracker.yaml only when you need to change interval/window/duration/active.
# @note: Active connections are limited (default 3, hard max 9); each open GATT connection uses RAM, so keep the count low.
# @note: NOT available on ESP32-S2 (no Bluetooth radio). Requires the native API (api:) enabled and the device adopted into Home Assistant.

defaults:
  st_bt_proxy_active: "true"
  st_bt_proxy_connection_slots: "3"

# esp32_ble_tracker is auto-loaded by bluetooth_proxy; it is intentionally NOT declared
# here so it stays overridable via bluetooth/ble_tracker.yaml.
bluetooth_proxy:
  active: ${st_bt_proxy_active}
  connection_slots: ${st_bt_proxy_connection_slots}
