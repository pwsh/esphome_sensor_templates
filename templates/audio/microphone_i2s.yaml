# @template: microphone_i2s
# @title: I2S MEMS Microphone
# @category: audio
# @description: An I2S digital MEMS microphone (INMP441 / SPH0645 class) on its own I2S bus, exposed as an ESPHome microphone component for use by micro_wake_word or voice_assistant.
# @platforms: esp32, esp32s2, esp32s3, esp32c3, esp32c6
# @requires: none
# @entities: none (audio component, not an HA entity)
# @var st_mic_lrclk [(required)]: GPIO for the I2S word-select / LR clock (WS on the mic)
# @var st_mic_bclk [(required)]: GPIO for the I2S bit clock (SCK on the mic)
# @var st_mic_din [(required)]: GPIO for the I2S data input (SD on the mic)
# @var st_mic_adc_type [external] {external}: ADC source - external for standalone I2S mics (the deprecated internal ADC path is no longer supported)
# @var st_mic_channel [left] {left|right|stereo}: Which I2S slot the mic drives (INMP441/SPH0645 with L/R tied low = left)
# @var st_mic_bits_per_sample [32bit] {8bit|16bit|24bit|32bit}: I2S word width (INMP441/SPH0645 are 24-bit data in a 32-bit frame -> 32bit)
# @var st_mic_sample_rate [16000]: Sample rate in Hz
# @note: micro_wake_word and voice_assistant both expect a 16 kHz mono microphone - keep st_mic_sample_rate at 16000 for them.
# @note: This template owns its own i2s_audio bus (id st_i2s_mic_bus). Single-I2S chips (ESP32-C3/C6) have only ONE I2S peripheral, so a mic and a speaker CANNOT run at the same time on them - use an ESP32 or ESP32-S3 (two I2S peripherals) to run microphone_i2s.yaml and speaker_i2s.yaml together.
# @note: INMP441/SPH0645 do not need a master clock (MCLK), so no i2s_mclk_pin is declared. Add one manually only if your mic requires it.

defaults:
  st_mic_adc_type: external
  st_mic_channel: left
  st_mic_bits_per_sample: 32bit
  st_mic_sample_rate: "16000"

# Dedicated I2S bus for the microphone. Kept separate from any speaker bus so both
# can coexist on dual-I2S chips (ESP32 / ESP32-S3).
i2s_audio:
  - id: st_i2s_mic_bus
    i2s_lrclk_pin: ${st_mic_lrclk}
    i2s_bclk_pin: ${st_mic_bclk}

microphone:
  - platform: i2s_audio
    id: st_microphone
    i2s_audio_id: st_i2s_mic_bus
    adc_type: ${st_mic_adc_type}
    i2s_din_pin: ${st_mic_din}
    channel: ${st_mic_channel}
    bits_per_sample: ${st_mic_bits_per_sample}
    sample_rate: ${st_mic_sample_rate}
