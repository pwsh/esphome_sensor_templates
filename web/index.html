<!-- Catalog data. Ships with the literal placeholder {}; tools/build_catalog.py
     injects the real catalog here. When empty, the page fetches catalog.json. -->
<script id="catalog" type="application/json">{"min_esphome":"2026.5.0","categories":["core","diagnostics","network","lighting","controls","inputs"],"templates":[{"slug":"daily_restart","title":"Daily Scheduled Restart","category":"controls","description":"Reboots the device once a day at a configurable hour by attaching a schedule to an existing time component.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["time"],"entities":[{"domain":"button","name":"Daily Restart","extra":"always internal"}],"vars":[{"name":"st_restart_hour","default":"4","required":false,"secret":false,"description":"Hour of day (0-23, local time) at which to restart"},{"name":"st_daily_restart_time_id","default":"st_time_sntp","required":false,"secret":false,"description":"id of the time component to attach the schedule to (st_time_ha for the HA time preset)"}],"notes":["Needs a time: component. Include core/time_sntp.yaml (default) or core/time_homeassistant.yaml (then pass st_daily_restart_time_id: st_time_ha). ESPHome allows only one SNTP instance, so this file deliberately does NOT ship its own clock - it attaches to yours via !extend.","time.on_time does not reschedule across DST jumps - an event in the 01:00-02:00 window may be skipped or fire twice on the changeover day. Keeping the default 03:00-04:00 window is safe in most zones."],"path":"templates/controls/daily_restart.yaml","body":"defaults:\n  st_restart_hour: \"4\"\n  st_daily_restart_time_id: st_time_sntp\n\ntime:\n  # Attach the schedule to an already-included time component (plain\n  # re-declaration of an id is a hard \"ID redefined!\" error - !extend is the\n  # sanctioned way for a package to add options to another package's entry).\n  - id: !extend ${st_daily_restart_time_id}\n    on_time:\n      - hours: ${st_restart_hour}\n        minutes: 0\n        seconds: 0\n        then:\n          - button.press: st_daily_restart_button\n\nbutton:\n  # Always internal: this is a scheduling primitive, not a user control. Kept as an entity (with a\n  # name) rather than a bare action so web_server's include_internal can still surface/trigger it.\n  - platform: restart\n    id: st_daily_restart_button\n    name: \"Daily Restart\"\n    entity_category: config\n    icon: mdi:restart\n    device_class: restart\n    internal: true\n"},{"slug":"factory_reset_button","title":"Factory Reset Button","category":"controls","description":"Exposes a button that erases all stored preferences and returns the device to its fresh-flash state. Ships disabled by default because an accidental press is destructive.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"button","name":"Factory Reset"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"true","required":false,"secret":false,"description":"Ship the entity disabled in HA (overrides the library default - see note)"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["IRREVERSIBLE. Erases all stored preferences - WiFi credentials, restore_value globals (e.g. boot counter), and improv/captive-portal provisioning - and returns the device to a fresh-flash state. It will not reconnect until re-provisioned.","Ships disabled_by_default: true (unlike the rest of the library) so an accidental tap cannot wipe the device; the user must deliberately enable it in HA."],"path":"templates/controls/factory_reset_button.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  # Override of the shared default: this control is destructive, so it ships disabled in HA.\n  st_disabled_by_default: \"true\"\n  st_internal: \"false\"\n\nbutton:\n  - platform: factory_reset\n    id: st_factory_reset_button\n    name: \"${st_name_prefix}Factory Reset\"\n    entity_category: config\n    icon: mdi:delete-restore\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"restart_button","title":"Restart Button","category":"controls","description":"Exposes a button in HA/web that soft-reboots the device (equivalent to a normal power cycle, config is re-applied).","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"button","name":"Restart"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["A plain restart re-applies the full config on next boot; use safe_mode_button.yaml instead if a broken config is preventing a normal boot."],"path":"templates/controls/restart_button.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nbutton:\n  - platform: restart\n    id: st_restart_button\n    name: \"${st_name_prefix}Restart\"\n    entity_category: config\n    icon: mdi:restart\n    device_class: restart\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"safe_mode_button","title":"Safe Mode Button","category":"controls","description":"Exposes a button that reboots the device into safe mode, where only network/logging/OTA run so a broken config can be re-flashed.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"button","name":"Restart (Safe Mode)"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Safe-mode boot brings up only network, logging and OTA - the rest of your config is skipped - so a config that crashes on boot can still be re-flashed over the air."],"path":"templates/controls/safe_mode_button.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\n# Bare safe_mode: so the safe_mode button platform has something to trigger. Declared with no\n# options here: if core/safe_mode.yaml is also included, ESPHome deep-merges the two dicts\n# key-by-key, so its tuned thresholds win and this bare block adds nothing.\nsafe_mode:\n\nbutton:\n  - platform: safe_mode\n    id: st_safe_mode_button\n    name: \"${st_name_prefix}Restart (Safe Mode)\"\n    entity_category: config\n    icon: mdi:restart-alert\n    device_class: restart\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"shutdown_button","title":"Shutdown Button","category":"controls","description":"Exposes a button that shuts the device down into deep sleep with no wake source. Only a physical reset or power cycle brings it back.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"button","name":"Shutdown"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Enters deep sleep with no wake source configured - the device stops responding to WiFi/API/OTA. Only a physical reset button press or power cycle recovers it, so do not press this on a device you cannot reach."],"path":"templates/controls/shutdown_button.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nbutton:\n  - platform: shutdown\n    id: st_shutdown_button\n    name: \"${st_name_prefix}Shutdown\"\n    entity_category: config\n    icon: mdi:power\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"status_led","title":"Status LED","category":"controls","description":"Drives an on-board LED as a firmware status indicator - slow blink on warnings (WiFi/API down), fast blink on errors.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[],"vars":[{"name":"st_status_led_pin","default":"","required":true,"secret":false,"description":"GPIO the status LED is wired to (e.g. GPIO8)"},{"name":"st_status_led_inverted","default":"false","required":false,"secret":false,"description":"C++ literal \"true\"/\"false\" - set \"true\" for active-low LEDs (many on-board LEDs)"}],"notes":["Blink semantics are fixed by ESPHome and cannot be customized - slow blink = warning (wifi/api down), fast blink = error. There is no HA entity; the LED reflects internal firmware state only.","The pin is claimed exclusively by status_led and is otherwise unusable for other outputs."],"path":"templates/controls/status_led.yaml","body":"defaults:\n  st_status_led_inverted: \"false\"\n\nstatus_led:\n  pin:\n    number: ${st_status_led_pin}\n    inverted: ${st_status_led_inverted}\n"},{"slug":"api","title":"Home Assistant API","category":"core","description":"Native Home Assistant API preset with encryption and a survival-friendly reboot_timeout. Provides the api: component templates like time_homeassistant require.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[],"vars":[{"name":"st_api_reboot_timeout","default":"0s","required":false,"secret":false,"description":"How long the API may stay disconnected before the device reboots (0s = never)"},{"name":"st_api_key","default":"","required":true,"secret":true,"description":"Base64 API encryption key; pass via vars: { st_api_key: !secret api_key }"}],"notes":["Never store the key in this file - it is a required var so the user supplies it with their own !secret."],"path":"templates/core/api.yaml","body":"defaults:\n  st_api_reboot_timeout: 0s\n\napi:\n  # reboot_timeout defaults to 15min in ESPHome. With any short timeout the\n  # device reboot-loops whenever Home Assistant is unreachable longer than the\n  # window - HA restarts, HA OS updates, add-on upgrades - and every reboot\n  # wipes in-RAM state (uptime, un-persisted globals, sensor history). Setting\n  # 0s means \"never reboot just because the API is down\": the device keeps\n  # running standalone and stays usable via web_server until HA returns.\n  reboot_timeout: ${st_api_reboot_timeout}\n  encryption:\n    # Required var - no default. Users pass: vars: { st_api_key: !secret api_key }\n    key: ${st_api_key}\n"},{"slug":"logger","title":"Logger","category":"core","description":"Logger preset with configurable level and UART baud rate.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[],"vars":[{"name":"st_log_level","default":"INFO","required":false,"secret":false,"description":"Log verbosity (compile-time ceiling)","choices":["NONE","ERROR","WARN","INFO","DEBUG","VERBOSE","VERY_VERBOSE"]},{"name":"st_log_baud_rate","default":"115200","required":false,"secret":false,"description":"UART baud rate; set 0 to disable UART (serial) logging entirely"}],"notes":["Since ESPHome 2026.4.0 state-change messages are logged at VERBOSE, so INFO/DEBUG stays cheap - the noisy per-state spam no longer floods those levels."],"path":"templates/core/logger.yaml","body":"defaults:\n  st_log_level: INFO\n  st_log_baud_rate: \"115200\"\n\nlogger:\n  level: ${st_log_level}\n  # Set st_log_baud_rate to 0 to turn off UART logging (frees the serial pins,\n  # saves the cost of formatting/writing every line to the port).\n  baud_rate: ${st_log_baud_rate}\n"},{"slug":"ota","title":"OTA Updates","category":"core","description":"Over-the-air update preset (esphome platform) with a password gate and progress logging hooks.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[],"vars":[{"name":"st_ota_password","default":"","required":true,"secret":true,"description":"OTA upload password; pass via vars: { st_ota_password: !secret ota_password }"}],"notes":["Presence of ota: also auto-enables safe_mode. Include safe_mode.yaml only to tune its thresholds."],"path":"templates/core/ota.yaml","body":"ota:\n  - platform: esphome\n    # Required var - no default. Users pass: vars: { st_ota_password: !secret ota_password }\n    password: ${st_ota_password}\n    on_begin:\n      then:\n        - logger.log: \"OTA start\"\n    on_progress:\n      then:\n        - logger.log:\n            format: \"OTA progress %0.1f%%\"\n            args: [\"x\"]\n    on_end:\n      then:\n        - logger.log: \"OTA end\"\n    on_error:\n      then:\n        - logger.log:\n            format: \"OTA update error %d\"\n            args: [\"x\"]\n"},{"slug":"safe_mode","title":"Safe Mode","category":"core","description":"Tunes the boot-loop recovery safe_mode: after repeated crash-boots the device stops applying its config so an OTA fix can land.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[],"vars":[{"name":"st_safe_mode_attempts","default":"10","required":false,"secret":false,"description":"Consecutive failed boots before entering safe mode"},{"name":"st_safe_mode_reboot_timeout","default":"5min","required":false,"secret":false,"description":"How long to wait in safe mode for an OTA before rebooting to retry"},{"name":"st_safe_mode_boot_good_after","default":"1min","required":false,"secret":false,"description":"Uptime after which a boot counts as successful and the attempt counter resets"}],"notes":["Required by the safe_mode button/switch platforms. safe_mode is auto-enabled anyway whenever ota: is present - this preset just tunes its thresholds."],"path":"templates/core/safe_mode.yaml","body":"defaults:\n  st_safe_mode_attempts: \"10\"\n  st_safe_mode_reboot_timeout: 5min\n  st_safe_mode_boot_good_after: 1min\n\nsafe_mode:\n  num_attempts: ${st_safe_mode_attempts}\n  reboot_timeout: ${st_safe_mode_reboot_timeout}\n  boot_is_good_after: ${st_safe_mode_boot_good_after}\n  on_safe_mode:\n    - logger.log: \"Safe mode activated\"\n"},{"slug":"time_homeassistant","title":"Home Assistant Time","category":"core","description":"Time source synced from Home Assistant. Provides the time: component other templates (daily_restart, last_boot) require.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["api"],"entities":[],"vars":[],"notes":["Timezone auto-syncs from Home Assistant unless you set it in YAML - override with \"time: - id: !extend st_time_ha / timezone: Europe/Berlin\".","Do not include together with time_sntp.yaml unless you want two time sources."],"path":"templates/core/time_homeassistant.yaml","body":"time:\n  - platform: homeassistant\n    id: st_time_ha\n"},{"slug":"time_sntp","title":"SNTP Time","category":"core","description":"SNTP time source with configurable server. Provides the time: component other templates (daily_restart, last_boot) require.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[],"vars":[{"name":"st_ntp_server","default":"0.pool.ntp.org","required":false,"secret":false,"description":"NTP server to sync against"}],"notes":["Timezone is deliberately NOT set here - ESPHome auto-infers it from the build machine. Override per device with \"time: - id: !extend st_time_sntp / timezone: Europe/Berlin\".","Do not include together with time_homeassistant.yaml unless you want two time sources."],"path":"templates/core/time_sntp.yaml","body":"defaults:\n  st_ntp_server: 0.pool.ntp.org\n\ntime:\n  - platform: sntp\n    id: st_time_sntp\n    servers:\n      - ${st_ntp_server}\n    on_time_sync:\n      then:\n        - logger.log: \"Synchronized system clock\"\n"},{"slug":"web_server","title":"Web Server","category":"core","description":"Built-in web UI (v3) with HTTP basic auth and a boot-time gate that can disable auth without editing the config. Keeps the device usable standalone when Home Assistant is down.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[],"vars":[{"name":"st_web_include_internal","default":"true","required":false,"secret":false,"description":"Show internal: entities in the web UI too (C++ bool literal)"},{"name":"st_web_username","default":"admin","required":false,"secret":false,"description":"HTTP basic auth username; MUST NOT be empty (see note)"},{"name":"st_web_password","default":"","required":true,"secret":true,"description":"HTTP basic auth password; pass via vars: { st_web_password: !secret web_password }"},{"name":"st_web_auth","default":"true","required":false,"secret":false,"description":"Enable auth at boot - must be exactly \"true\" or \"false\", substituted as a C++ bool literal"}],"notes":["st_web_auth is injected raw into a lambda as a C++ bool literal, so it MUST be exactly \"true\" or \"false\" - not \"1\", \"yes\", or \"True\".","WebServerBase::add_handler only wraps handlers in auth middleware when credentials are non-empty AT REGISTRATION TIME. web_server registers its handlers in setup() at priority ~249 (WIFI-1), so clearing the credentials in on_boot at priority 600 (which runs earlier) disables auth for the whole boot.","st_web_username must NOT be empty - web_server_idf's authenticate() FAILS OPEN on an empty username (returns true for every request), silently disabling auth. Password-only auth is therefore not possible."],"path":"templates/core/web_server.yaml","body":"defaults:\n  st_web_include_internal: \"true\"\n  st_web_username: \"admin\"\n  st_web_auth: \"true\"\n\nesphome:\n  on_boot:\n    # Priority 600 runs before web_server registers its handlers (setup, ~249),\n    # so clearing credentials here means add_handler never wraps them in auth\n    # middleware for this boot. See @note above for the timing details.\n    - priority: 600\n      then:\n        - lambda: |-\n            if (!${st_web_auth}) {\n              web_server_base::global_web_server_base->set_auth_username(\"\");\n              web_server_base::global_web_server_base->set_auth_password(\"\");\n            }\n\nweb_server:\n  version: 3\n  include_internal: ${st_web_include_internal}\n  auth:\n    # Username must stay non-empty even when auth is \"disabled\" - an empty\n    # username makes authenticate() fail open (see @note above).\n    username: \"${st_web_username}\"\n    # Required var - no default. Users pass: vars: { st_web_password: !secret web_password }\n    password: \"${st_web_password}\"\n"},{"slug":"boot_counter","title":"Boot Counter","category":"diagnostics","description":"Counts device boots in an NVS-backed global and publishes the running total. Rising counts between expected reboots point at brown-outs, watchdog resets, or crashes.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Boot Count"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["One NVS write per boot (restore_value) - negligible flash wear. The count survives reboots and OTA but NOT a factory_reset or a wired flash-erase.","This is a counter - state_class is hardcoded total_increasing and does NOT honor the ${st_state_class} knob. There is no update_interval: the value is published once from on_boot."],"path":"templates/diagnostics/boot_counter.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\n# NVS-backed counter. restore_value persists it across reboots/OTA.\nglobals:\n  - id: st_boot_counter_value\n    type: int\n    restore_value: true\n    initial_value: \"0\"\n\nesphome:\n  on_boot:\n    # priority 600 runs early, before Wi-Fi/API, so the count is ready to publish.\n    - priority: 600\n      then:\n        - lambda: |-\n            id(st_boot_counter_value) += 1;\n            id(st_boot_counter).publish_state(id(st_boot_counter_value));\n\nsensor:\n  - platform: template\n    id: st_boot_counter\n    name: \"${st_name_prefix}Boot Count\"\n    # Published only from on_boot; never polled.\n    update_interval: never\n    accuracy_decimals: 0\n    # Monotonic counter: total_increasing is required, hardcoded (no knob).\n    state_class: total_increasing\n    icon: mdi:counter\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"chip_info","title":"Chip Info","category":"diagnostics","description":"Reports the SoC model, silicon revision, core count and radio features decoded from esp_chip_info(). One glance confirms exactly which ESP32 variant a build is running on.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text_sensor","name":"Chip Model"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Static per boot - update_interval is never and the value is published exactly once from on_boot at priority -100 (after sensors are set up).","On IDF5 esp_chip_info_t.revision is encoded as major*100+minor, so it is split back into \"major.minor\" (e.g. 0.4). The features bitmask is decoded to a \"/\"-joined radio list (WiFi/BT/BLE/802.15.4)."],"path":"templates/diagnostics/chip_info.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nesphome:\n  # esp_chip_info.h is not pulled into main.cpp by any component, so force-include\n  # it for the lambda below. build_src_flags only affects the project's own src/\n  # (main.cpp) and the list concatenates cleanly with flags from other templates.\n  platformio_options:\n    build_src_flags:\n      - \"-include esp_chip_info.h\"\n  on_boot:\n    # priority -100 runs late, after all sensors/text_sensors are set up, so the\n    # one-shot component.update below publishes into a live entity.\n    - priority: -100\n      then:\n        - component.update: st_chip_info\n\ntext_sensor:\n  - platform: template\n    id: st_chip_info\n    name: \"${st_name_prefix}Chip Model\"\n    icon: mdi:chip\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # Static hardware fact - computed once and pushed from on_boot, never polled.\n    update_interval: never\n    lambda: |-\n      esp_chip_info_t ci;\n      esp_chip_info(&ci);\n      const char *model;\n      switch (ci.model) {\n        case CHIP_ESP32:    model = \"ESP32\";    break;\n        case CHIP_ESP32S2:  model = \"ESP32-S2\"; break;\n        case CHIP_ESP32S3:  model = \"ESP32-S3\"; break;\n        case CHIP_ESP32C3:  model = \"ESP32-C3\"; break;\n        case CHIP_ESP32C6:  model = \"ESP32-C6\"; break;\n        case CHIP_ESP32H2:  model = \"ESP32-H2\"; break;\n        default:            model = \"ESP32-family\"; break;\n      }\n      // Decode the radio feature bitmask into a \"/\"-joined list.\n      char feat[40];\n      int n = 0;\n      if (ci.features & CHIP_FEATURE_WIFI_BGN)\n        n += snprintf(feat + n, sizeof(feat) - n, \"%sWiFi\", n ? \"/\" : \"\");\n      if (ci.features & CHIP_FEATURE_BT)\n        n += snprintf(feat + n, sizeof(feat) - n, \"%sBT\", n ? \"/\" : \"\");\n      if (ci.features & CHIP_FEATURE_BLE)\n        n += snprintf(feat + n, sizeof(feat) - n, \"%sBLE\", n ? \"/\" : \"\");\n      if (ci.features & CHIP_FEATURE_IEEE802154)\n        n += snprintf(feat + n, sizeof(feat) - n, \"%s802.15.4\", n ? \"/\" : \"\");\n      // revision is major*100+minor on IDF5.\n      char buf[96];\n      snprintf(buf, sizeof(buf), \"%s rev %u.%u, %d core%s, %s\",\n               model,\n               (unsigned) (ci.revision / 100), (unsigned) (ci.revision % 100),\n               ci.cores, ci.cores == 1 ? \"\" : \"s\", feat);\n      return {std::string(buf)};\n"},{"slug":"cpu_frequency","title":"CPU Frequency","category":"diagnostics","description":"Reports the current CPU clock from the debug component. Useful for confirming power-save/DFS behaviour or a mis-set framework clock.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"CPU Frequency"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often the debug hub refreshes the clock"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for the sensor; set \"\" to opt out of HA long-term statistics"}],"notes":["Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins."],"path":"templates/diagnostics/cpu_frequency.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n\n# Shared debug hub (merges with other debug-based templates).\ndebug:\n  update_interval: ${st_update_interval}\n\nsensor:\n  - platform: debug\n    # The debug component reports the clock in Hz, so unit is Hz and it is a\n    # whole number - accuracy_decimals 0.\n    cpu_frequency:\n      id: st_cpu_frequency\n      name: \"${st_name_prefix}CPU Frequency\"\n      device_class: frequency\n      unit_of_measurement: Hz\n      accuracy_decimals: 0\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:speedometer\n"},{"slug":"device_info","title":"Device Info","category":"diagnostics","description":"Exposes the debug component's device text sensors - a one-line hardware/firmware summary (chip model, cores, revision, flash size, ESPHome version) and the last reset reason.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text_sensor","name":"Device Info"},{"domain":"text_sensor","name":"Reset Reason"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often the debug hub refreshes the text sensors"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to every entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"}],"notes":["Prefer this over hand-rolled esp_reset_reason() lambdas - the debug component decodes the reason string for you.","Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins."],"path":"templates/diagnostics/device_info.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\n# Shared debug hub (merges with other debug-based templates).\ndebug:\n  update_interval: ${st_update_interval}\n\ntext_sensor:\n  - platform: debug\n    # device: is the multi-field hardware/firmware summary; reset_reason: is the\n    # decoded cause of the last restart (both text - no state_class).\n    device:\n      id: st_device_info\n      name: \"${st_name_prefix}Device Info\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:chip\n    reset_reason:\n      id: st_reset_reason\n      name: \"${st_name_prefix}Reset Reason\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:restart\n"},{"slug":"esphome_version","title":"ESPHome Version","category":"diagnostics","description":"Publishes the ESPHome version the firmware was built with via the version text_sensor platform. Handy for spotting devices that missed an OTA.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text_sensor","name":"ESPHome Version"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_version_hide_timestamp","default":"false","required":false,"secret":false,"description":"\"true\" drops the compile timestamp and shows just the version string (C++ literal)"}],"notes":["The value is fixed at compile time, so it only changes on a rebuild/OTA."],"path":"templates/diagnostics/esphome_version.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_version_hide_timestamp: \"false\"\n\ntext_sensor:\n  - platform: version\n    id: st_esphome_version\n    name: \"${st_name_prefix}ESPHome Version\"\n    icon: mdi:chip\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # true = show just the version, false = append the build timestamp.\n    hide_timestamp: ${st_version_hide_timestamp}\n"},{"slug":"flash_info","title":"Flash Size","category":"diagnostics","description":"Reports the physical SPI flash size in MiB, read from the flash chip at runtime via esp_flash_get_size(). Confirms whether a board really carries the 4/8/16 MiB it was sold as.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Flash Size"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Static per boot - update_interval is never and the value is published exactly once from on_boot at priority -100 (after sensors are set up).","No state_class is set - a fixed hardware size is not a measurement and needs no HA long-term statistics, so it deliberately does NOT honor the ${st_state_class} knob.","Flash SPEED and mode are compile-time board settings and are not exposed at runtime; the debug component's device_info text sensor shows them in its summary string."],"path":"templates/diagnostics/flash_info.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nesphome:\n  # esp_flash.h is not pulled into main.cpp by any component, so force-include it\n  # for the lambda below. build_src_flags only affects the project's own src/\n  # (main.cpp) and the list concatenates cleanly with flags from other templates.\n  platformio_options:\n    build_src_flags:\n      - \"-include esp_flash.h\"\n  on_boot:\n    # priority -100 runs late, after all sensors are set up, so the one-shot\n    # component.update below publishes into a live entity.\n    - priority: -100\n      then:\n        - component.update: st_flash_size\n\nsensor:\n  - platform: template\n    id: st_flash_size\n    name: \"${st_name_prefix}Flash Size\"\n    unit_of_measurement: MiB\n    device_class: data_size\n    accuracy_decimals: 0\n    icon: mdi:memory\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # Static hardware fact - computed once and pushed from on_boot, never polled.\n    update_interval: never\n    # NULL selects esp_flash_default_chip (the on-board SPI flash).\n    lambda: |-\n      uint32_t size;\n      if (esp_flash_get_size(NULL, &size) != ESP_OK) return NAN;\n      return size / 1048576.0;\n"},{"slug":"heap","title":"Heap Diagnostics","category":"diagnostics","description":"Reports internal heap health from the debug component - free bytes, largest allocatable block, historical minimum free, and fragmentation percent. The first thing to check when a device reboots under memory pressure.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Heap Free"},{"domain":"sensor","name":"Heap Max Block"},{"domain":"sensor","name":"Heap Min Free"},{"domain":"sensor","name":"Heap Fragmentation"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often the debug hub refreshes heap stats"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to every entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for the numeric sensors; set \"\" to opt out of HA long-term statistics"}],"notes":["Several diagnostics templates declare the debug: hub. ESPHome deep-merges the dict across packages, so the last update_interval wins - keep the knob identical everywhere.","Sustained fragmentation above ~50% is risky - large contiguous allocations (TLS buffers, JSON) can fail even with free bytes available."],"path":"templates/diagnostics/heap.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n\n# Shared debug hub. Dicts merge across packages; the update_interval set by\n# whichever debug-based template is merged last wins for all of them.\ndebug:\n  update_interval: ${st_update_interval}\n\nsensor:\n  - platform: debug\n    free:\n      id: st_heap_free\n      name: \"${st_name_prefix}Heap Free\"\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:memory\n    block:\n      id: st_heap_max_block\n      name: \"${st_name_prefix}Heap Max Block\"\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:memory\n    min_free:\n      id: st_heap_min_free\n      name: \"${st_name_prefix}Heap Min Free\"\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:memory\n    fragmentation:\n      id: st_heap_fragmentation\n      name: \"${st_name_prefix}Heap Fragmentation\"\n      unit_of_measurement: \"%\"\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:memory\n"},{"slug":"internal_temperature","title":"Internal Temperature","category":"diagnostics","description":"Reads the on-die temperature sensor and derives a coupled overtemperature warning binary sensor that trips above a configurable threshold.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Internal Temperature"},{"domain":"binary_sensor","name":"Overtemperature"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to sample the die temperature"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to every entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for the temperature sensor; set \"\" to opt out of HA long-term statistics"},{"name":"st_overtemp_threshold","default":"80","required":false,"secret":false,"description":"Warning trips above this many degC (numeric, substituted into C++)"}],"notes":["Some ESP32 variants report bogus values (e.g. a stuck 53.3 degC / raw 128). The internal_temperature component discards invalid readings, and the warning lambda ignores NaN."],"path":"templates/diagnostics/internal_temperature.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n  st_overtemp_threshold: \"80\"\n\nsensor:\n  - platform: internal_temperature\n    id: st_internal_temperature\n    name: \"${st_name_prefix}Internal Temperature\"\n    device_class: temperature\n    unit_of_measurement: \"°C\"\n    accuracy_decimals: 1\n    state_class: \"${st_state_class}\"\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    icon: mdi:thermometer\n    update_interval: ${st_update_interval}\n\nbinary_sensor:\n  - platform: template\n    id: st_overtemp_warning\n    name: \"${st_name_prefix}Overtemperature\"\n    device_class: heat\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    icon: mdi:thermometer-alert\n    # Return {} while the reading is unknown so we never latch a false alarm on\n    # a NaN; ${st_overtemp_threshold} is a bare number spliced into the compare.\n    lambda: |-\n      if (isnan(id(st_internal_temperature).state)) return {};\n      return id(st_internal_temperature).state > ${st_overtemp_threshold};\n"},{"slug":"last_boot","title":"Last Boot","category":"diagnostics","description":"Publishes the wall-clock timestamp of the last boot as a timestamp sensor. HA renders it as a relative \"last seen\"-style time.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["time"],"entities":[{"domain":"sensor","name":"Last Boot"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Needs any time: component (e.g. core/time_sntp.yaml). Publishes once after the clock syncs; there is no update_interval (that only applies to type: seconds) and no state_class (device_class timestamp handles it)."],"path":"templates/diagnostics/last_boot.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nsensor:\n  - platform: uptime\n    # type: timestamp computes boot wall-clock time once the clock is valid and\n    # republishes only if it drifts; device_class defaults to timestamp - leave it.\n    type: timestamp\n    id: st_last_boot\n    name: \"${st_name_prefix}Last Boot\"\n    device_class: timestamp\n    icon: mdi:clock-start\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"loop_time","title":"Loop Time","category":"diagnostics","description":"Reports the main-loop iteration time from the debug component, in milliseconds. Spikes reveal a component that blocks the loop (slow I2C, long lambdas).","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Loop Time"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often the debug hub refreshes loop time"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for the sensor; set \"\" to opt out of HA long-term statistics"}],"notes":["Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins."],"path":"templates/diagnostics/loop_time.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n\n# Shared debug hub (merges with other debug-based templates).\ndebug:\n  update_interval: ${st_update_interval}\n\nsensor:\n  - platform: debug\n    # Reported by the debug component as the measured main-loop latency; a\n    # healthy loop stays low, sustained spikes point at a blocking component.\n    loop_time:\n      id: st_loop_time\n      name: \"${st_name_prefix}Loop Time\"\n      unit_of_measurement: ms\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:timer-sync-outline\n"},{"slug":"memory_info","title":"Memory Info","category":"diagnostics","description":"Reports total installed internal RAM and total PSRAM in KiB, read from the heap capability registry. Confirms how much DRAM and external SPI RAM the running build actually sees.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"RAM Total"},{"domain":"sensor","name":"PSRAM Total"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity names"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"}],"notes":["Static per boot - update_interval is never and both values are published exactly once from on_boot at priority -100 (after sensors are set up).","No state_class is set - fixed hardware totals are not measurements and need no HA long-term statistics, so they deliberately do NOT honor the ${st_state_class} knob.","PSRAM Total reports 0 on boards without external SPI RAM (e.g. ESP32-C3/C6). It reads the heap capability registry (MALLOC_CAP_SPIRAM) directly and does NOT require the psram: component to be configured."],"path":"templates/diagnostics/memory_info.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nesphome:\n  # esp_heap_caps.h is not pulled into main.cpp by any component, so force-include\n  # it for the lambdas below. build_src_flags only affects the project's own src/\n  # (main.cpp) and the list concatenates cleanly with flags from other templates.\n  platformio_options:\n    build_src_flags:\n      - \"-include esp_heap_caps.h\"\n  on_boot:\n    # priority -100 runs late, after all sensors are set up, so the one-shot\n    # component.updates below publish into live entities.\n    - priority: -100\n      then:\n        - component.update: st_ram_total\n        - component.update: st_psram_total\n\nsensor:\n  - platform: template\n    id: st_ram_total\n    name: \"${st_name_prefix}RAM Total\"\n    unit_of_measurement: KiB\n    device_class: data_size\n    accuracy_decimals: 0\n    icon: mdi:memory\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # Static hardware fact - computed once and pushed from on_boot, never polled.\n    update_interval: never\n    lambda: |-\n      return heap_caps_get_total_size(MALLOC_CAP_INTERNAL) / 1024.0;\n\n  - platform: template\n    id: st_psram_total\n    name: \"${st_name_prefix}PSRAM Total\"\n    unit_of_measurement: KiB\n    device_class: data_size\n    accuracy_decimals: 0\n    icon: mdi:memory\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # Static hardware fact - computed once and pushed from on_boot, never polled.\n    # Reports 0 on boards with no PSRAM (registry has no MALLOC_CAP_SPIRAM pool).\n    update_interval: never\n    lambda: |-\n      return heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / 1024.0;\n"},{"slug":"nvs_usage","title":"NVS Usage","category":"diagnostics","description":"Reports NVS entry fill (used/total) and the on-device NVS partition size. Diagnoses ESP_ERR_NVS_NOT_ENOUGH_SPACE before it bites.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text_sensor","name":"NVS Usage"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to poll NVS statistics"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["OTA never updates the partition table. A device first flashed with an old ESPHome may still run a 20 kB NVS even though current ESPHome allocates 448 kB - only a wired flash replaces the table."],"path":"templates/diagnostics/nvs_usage.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nesphome:\n  # nvs.h / esp_partition.h are not pulled into main.cpp by any component, so\n  # force-include them for the lambda below. build_src_flags only affects the\n  # project's own src/ (main.cpp), not the framework build, and the list\n  # concatenates cleanly with flags from other templates.\n  platformio_options:\n    build_src_flags:\n      - \"-include nvs.h\"\n      - \"-include esp_partition.h\"\n\ntext_sensor:\n  - platform: template\n    id: st_nvs_usage\n    name: \"${st_name_prefix}NVS Usage\"\n    icon: mdi:database\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n    # nvs_get_stats() covers the default \"nvs\" partition; the partition lookup\n    # reports the size actually flashed to THIS device (see @note above).\n    lambda: |-\n      nvs_stats_t s;\n      if (nvs_get_stats(NULL, &s) != ESP_OK) return {\"unavailable\"};\n      const esp_partition_t *p = esp_partition_find_first(\n          ESP_PARTITION_TYPE_DATA, ESP_PARTITION_SUBTYPE_DATA_NVS, nullptr);\n      char buf[64];\n      snprintf(buf, sizeof(buf), \"%u/%u entries, %u kB partition\",\n               (unsigned) s.used_entries, (unsigned) s.total_entries,\n               p != nullptr ? (unsigned) (p->size / 1024) : 0);\n      return {std::string(buf)};\n"},{"slug":"psram","title":"PSRAM Free","category":"diagnostics","description":"Reports free PSRAM (SPI RAM) in bytes from the debug component. Confirms that external PSRAM is detected and tracks headroom for buffer-heavy components.","platforms":["esp32","esp32s2","esp32s3"],"requires":["psram"],"entities":[{"domain":"sensor","name":"PSRAM Free"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often the debug hub refreshes PSRAM stats"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for the sensor; set \"\" to opt out of HA long-term statistics"}],"notes":["ESP32-C3/C6 have no PSRAM interface - this template is limited to esp32/s2/s3. Requires the psram: component configured AND PSRAM hardware present, otherwise the sensor reports 0.","Shares the debug: hub with the other debug-based templates; dicts merge across packages and the last update_interval wins."],"path":"templates/diagnostics/psram.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n\n# Shared debug hub (merges with other debug-based templates).\ndebug:\n  update_interval: ${st_update_interval}\n\nsensor:\n  - platform: debug\n    # Only populated when the psram: component is configured and the module\n    # actually has SPI RAM - otherwise reports 0.\n    psram:\n      id: st_psram_free\n      name: \"${st_name_prefix}PSRAM Free\"\n      unit_of_measurement: B\n      device_class: data_size\n      state_class: \"${st_state_class}\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n      icon: mdi:memory\n"},{"slug":"uptime","title":"Uptime (seconds)","category":"diagnostics","description":"Reports device uptime in seconds as a monotonic counter. The canonical \"is it still up?\" signal for HA availability graphs.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"sensor","name":"Uptime"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to publish the uptime value"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["This is a counter - state_class is hardcoded total_increasing and does NOT honor the ${st_state_class} knob."],"path":"templates/diagnostics/uptime.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nsensor:\n  - platform: uptime\n    type: seconds\n    id: st_uptime_seconds\n    name: \"${st_name_prefix}Uptime\"\n    device_class: duration\n    # Monotonic counter: total_increasing is semantically required, so it is\n    # hardcoded here rather than driven by the ${st_state_class} knob.\n    state_class: total_increasing\n    unit_of_measurement: s\n    accuracy_decimals: 0\n    icon: mdi:timer-outline\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n"},{"slug":"uptime_text","title":"Uptime (human-readable)","category":"diagnostics","description":"Reports device uptime as a human-readable string (e.g. \"3d 4h 12m 5s\") using the uptime platform's built-in formatting. Nicer to read on a dashboard than raw seconds.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text_sensor","name":"Uptime"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to refresh the formatted string"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Supersedes the old hand-rolled lambda approach - the uptime text_sensor platform now formats the string natively via the format: block."],"path":"templates/diagnostics/uptime_text.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\ntext_sensor:\n  - platform: uptime\n    id: st_uptime_text\n    name: \"${st_name_prefix}Uptime\"\n    icon: mdi:timer-outline\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n    # Built-in formatting: separator + per-unit suffixes yield \"3d 4h 12m 5s\".\n    format:\n      separator: \" \"\n      days: \"d\"\n      hours: \"h\"\n      minutes: \"m\"\n      seconds: \"s\"\n"},{"slug":"deep_sleep_control","title":"HA-Controlled Deep Sleep","category":"inputs","description":"The classic Home Assistant-controlled deep sleep pattern. The device sleeps between runs but honors an HA input_boolean that can hold it awake for OTA/config.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["api","HA input_boolean helper named by st_prevent_sleep_entity"],"entities":[],"vars":[{"name":"st_sleep_duration","default":"10min","required":false,"secret":false,"description":"How long the device stays asleep between runs"},{"name":"st_run_duration","default":"60s","required":false,"secret":false,"description":"How long the device stays awake each run before sleeping"},{"name":"st_prevent_sleep_entity","default":"input_boolean.prevent_deep_sleep","required":false,"secret":false,"description":"HA entity that, when ON, prevents sleep"}],"notes":["SINGLE-INSTANCE - this file uses fixed ids (st_deep_sleep, st_prevent_sleep). Include it exactly ONCE.","Requires an active api: connection - the homeassistant binary_sensor platform reads the toggle over the API.","The device can only see the toggle WHILE AWAKE. Flip the HA input_boolean ON *before* the next wake so the device catches it during its brief run_duration window (that window is your OTA opportunity).","When the toggle goes back OFF (on_release), deep_sleep.allow re-arms sleep and restarts the run_duration timer, so the device stays awake for a fresh run_duration before sleeping again.","Create the helper in HA: Settings > Devices & Services > Helpers > Toggle, matching st_prevent_sleep_entity."],"path":"templates/inputs/deep_sleep_control.yaml","body":"defaults:\n  st_sleep_duration: 10min\n  st_run_duration: 60s\n  st_prevent_sleep_entity: input_boolean.prevent_deep_sleep\n\ndeep_sleep:\n  id: st_deep_sleep\n  sleep_duration: ${st_sleep_duration}\n  run_duration: ${st_run_duration}\n\nbinary_sensor:\n  # Always internal: this is a control input from HA, not a user-facing entity.\n  - platform: homeassistant\n    id: st_prevent_sleep\n    entity_id: ${st_prevent_sleep_entity}\n    internal: true\n    # Toggle ON in HA -> hold the device awake.\n    on_press:\n      then:\n        - deep_sleep.prevent: st_deep_sleep\n    # Toggle OFF in HA -> re-allow sleep and restart the run_duration timer.\n    on_release:\n      then:\n        - deep_sleep.allow: st_deep_sleep\n"},{"slug":"generic_number","title":"Generic Number Input","category":"inputs","description":"A user-adjustable template number, surfaced in HA as a config control. Use it for thresholds, calibration offsets, setpoints - read the value elsewhere via id(...).state.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"number","name":"Setpoint"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_number_id","default":"st_generic_number","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_number_name","default":"Setpoint","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_number_min","default":"-100","required":false,"secret":false,"description":"Minimum selectable value"},{"name":"st_number_max","default":"100","required":false,"secret":false,"description":"Maximum selectable value"},{"name":"st_number_step","default":"1","required":false,"secret":false,"description":"Increment between values"},{"name":"st_number_initial","default":"0","required":false,"secret":false,"description":"Value used before anything is restored/set"},{"name":"st_number_unit","default":"","required":false,"secret":false,"description":"Unit of measurement shown in HA (e.g. \"C\", \"%\")"},{"name":"st_number_mode","default":"box","required":false,"secret":false,"description":"UI control style in HA","choices":["box","slider","auto"]},{"name":"st_number_restore","default":"true","required":false,"secret":false,"description":"Persist the value across reboots (C++ literal \"true\"/\"false\")"}],"notes":["MULTI-INSTANCE - include this file more than once to get several numbers. Each extra include MUST override BOTH st_number_id AND st_number_name; duplicate ids are a hard \"ID redefined!\" compile error.","On a template number, restore_value is INCOMPATIBLE with a lambda, so this template uses optimistic:true (the entity holds its own state) and no lambda.","restore_value:true writes to NVS on every change (one flash write per change). NVS flash has limited write endurance - leave it \"false\" for values that change very often."],"path":"templates/inputs/generic_number.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_number_id: st_generic_number\n  st_number_name: \"Setpoint\"\n  st_number_min: \"-100\"\n  st_number_max: \"100\"\n  st_number_step: \"1\"\n  st_number_initial: \"0\"\n  st_number_unit: \"\"\n  st_number_mode: box\n  st_number_restore: \"true\"\n\nnumber:\n  - platform: template\n    # The id itself is a var so the file can be included multiple times.\n    id: ${st_number_id}\n    name: \"${st_name_prefix}${st_number_name}\"\n    min_value: ${st_number_min}\n    max_value: ${st_number_max}\n    step: ${st_number_step}\n    initial_value: ${st_number_initial}\n    unit_of_measurement: \"${st_number_unit}\"\n    mode: ${st_number_mode}\n    # optimistic + no lambda: the component stores its own state.\n    optimistic: true\n    restore_value: ${st_number_restore}\n    entity_category: config\n    icon: mdi:tune\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"generic_select","title":"Generic Select Input","category":"inputs","description":"A user-adjustable template select (dropdown), surfaced in HA as a config control. Use it to pick a mode/profile and read the choice elsewhere via id(...).state.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"select","name":"Mode"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_select_id","default":"st_generic_select","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_select_name","default":"Mode","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_select_options","default":"[\"Option A\", \"Option B\"]","required":false,"secret":false,"description":"List of options - pass a YAML list in vars:"},{"name":"st_select_initial","default":"Option A","required":false,"secret":false,"description":"Option selected before anything is restored/set"},{"name":"st_select_restore","default":"true","required":false,"secret":false,"description":"Persist the selection across reboots (C++ literal \"true\"/\"false\")"}],"notes":["MULTI-INSTANCE - include this file more than once to get several selects. Each extra include MUST override BOTH st_select_id AND st_select_name; duplicate ids are a hard \"ID redefined!\" compile error.","st_select_options is a LIST-valued substitution. Pass it exactly like any other var, but as a YAML list, e.g. vars: { st_select_options: [\"Eco\", \"Comfort\", \"Boost\"] }.","st_select_initial MUST be one of st_select_options, otherwise config validation fails.","On a template select, restore_value is INCOMPATIBLE with a lambda, so this template uses optimistic:true (the entity holds its own state) and no lambda.","restore_value:true writes to NVS on every change (one flash write per change) - NVS flash has limited write endurance."],"path":"templates/inputs/generic_select.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_select_id: st_generic_select\n  st_select_name: \"Mode\"\n  # List-valued substitution: users override by passing their own YAML list.\n  st_select_options:\n    - \"Option A\"\n    - \"Option B\"\n  st_select_initial: \"Option A\"\n  st_select_restore: \"true\"\n\nselect:\n  - platform: template\n    # The id itself is a var so the file can be included multiple times.\n    id: ${st_select_id}\n    name: \"${st_name_prefix}${st_select_name}\"\n    options: ${st_select_options}\n    initial_option: \"${st_select_initial}\"\n    # optimistic + no lambda: the component stores its own state.\n    optimistic: true\n    restore_value: ${st_select_restore}\n    entity_category: config\n    icon: mdi:form-dropdown\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"generic_switch","title":"Generic Switch (virtual flag)","category":"inputs","description":"A virtual template switch, surfaced in HA as a config control. Use it as an on/off flag to gate automations - read it via id(...).state or attach actions with !extend.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"switch","name":"Flag"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_switch_id","default":"st_generic_switch","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_switch_name","default":"Flag","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_switch_restore_mode","default":"RESTORE_DEFAULT_OFF","required":false,"secret":false,"description":"Boot behavior - see enum in notes","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON","DISABLED"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several switches. Each extra include MUST override BOTH st_switch_id AND st_switch_name; duplicate ids are a hard \"ID redefined!\" compile error.","restore_mode enum: RESTORE_DEFAULT_OFF, RESTORE_DEFAULT_ON, ALWAYS_OFF, ALWAYS_ON, RESTORE_INVERTED_DEFAULT_OFF, RESTORE_INVERTED_DEFAULT_ON, DISABLED. RESTORE_* variants read the last state from NVS (one flash write per change); ALWAYS_* never persist.","This is a virtual flag - it drives nothing on its own. Read id(st_generic_switch).state in a lambda, or attach on_turn_on/on_turn_off actions via \"switch: - id: !extend st_generic_switch\"."],"path":"templates/inputs/generic_switch.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_switch_id: st_generic_switch\n  st_switch_name: \"Flag\"\n  st_switch_restore_mode: RESTORE_DEFAULT_OFF\n\nswitch:\n  - platform: template\n    # The id itself is a var so the file can be included multiple times.\n    id: ${st_switch_id}\n    name: \"${st_name_prefix}${st_switch_name}\"\n    # optimistic: the switch tracks its own commanded state (no output to drive).\n    optimistic: true\n    restore_mode: ${st_switch_restore_mode}\n    entity_category: config\n    icon: mdi:toggle-switch-outline\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"generic_text","title":"Generic Text Input","category":"inputs","description":"A user-editable template text field, surfaced in HA as a config control. Use it for free-form notes, labels, or short config strings - read it via id(...).state.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"text","name":"Note"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_text_id","default":"st_generic_text","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_text_name","default":"Note","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_text_max_length","default":"64","required":false,"secret":false,"description":"Maximum number of characters allowed"},{"name":"st_text_restore","default":"false","required":false,"secret":false,"description":"Persist the text across reboots (C++ literal \"true\"/\"false\")"}],"notes":["MULTI-INSTANCE - include this file more than once to get several text fields. Each extra include MUST override BOTH st_text_id AND st_text_name; duplicate ids are a hard \"ID redefined!\" compile error.","On a template text, restore_value is INCOMPATIBLE with a lambda, so this template uses optimistic:true (the entity holds its own state) and no lambda.","Text values eat NVS space (a whole string per write, one flash write per change), so restore_value defaults to \"false\" here. Turn it \"true\" only when persistence is genuinely needed."],"path":"templates/inputs/generic_text.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_text_id: st_generic_text\n  st_text_name: \"Note\"\n  st_text_max_length: \"64\"\n  st_text_restore: \"false\"\n\ntext:\n  - platform: template\n    # The id itself is a var so the file can be included multiple times.\n    id: ${st_text_id}\n    name: \"${st_name_prefix}${st_text_name}\"\n    mode: text\n    # optimistic + no lambda: the component stores its own state.\n    optimistic: true\n    restore_value: ${st_text_restore}\n    min_length: 0\n    max_length: ${st_text_max_length}\n    entity_category: config\n    icon: mdi:form-textbox\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"led_strip","title":"Addressable RGB LED Strip (RMT)","category":"lighting","description":"A WS2812-family addressable RGB strip driven by the ESP32 RMT peripheral. Ships a conservative, USB-safe brightness cap and a curated set of addressable effects.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"light","name":"LED Strip"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_led_strip_id","default":"st_led_strip","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_led_strip_name","default":"LED Strip","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_led_strip_pin","default":"","required":true,"secret":false,"description":"Data-line GPIO the strip is wired to"},{"name":"st_num_leds","default":"30","required":false,"secret":false,"description":"Number of LEDs on the strip"},{"name":"st_led_chipset","default":"WS2812","required":false,"secret":false,"description":"LED controller chipset","choices":["WS2812","WS2811","SK6812","APA106","SM16703"]},{"name":"st_rgb_order","default":"GRB","required":false,"secret":false,"description":"Byte order the chipset expects (see notes)","choices":["RGB","RBG","GRB","GBR","BRG","BGR"]},{"name":"st_power_limit","default":"0.5","required":false,"secret":false,"description":"0.0-1.0 per-channel brightness cap applied via color_correct (USB-safe default)"},{"name":"st_light_restore_mode","default":"ALWAYS_OFF","required":false,"secret":false,"description":"Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several strips. Each extra include MUST override st_led_strip_id, st_led_strip_name AND st_led_strip_pin; duplicate ids or shared data pins are errors.","POWER CAP - a WS2812-class LED draws ~60 mA at full white. A 500 mA USB budget minus ~150 mA for the ESP32 leaves headroom for only ~5-8 LEDs at 100%. st_power_limit defaults to 0.5 (color_correct halves every channel). Raise it toward 1.0 ONLY when the strip has its own injected power supply.","RGB ORDER - the WS2812/SK6812/APA106 family is GRB; WS2811 strips are commonly RGB. If red and green look swapped, flip st_rgb_order.","Effects are compiled in but cost nothing until activated from HA - the curated list below is free to keep.","rmt_symbols / use_dma are optional RMT tuning knobs; the defaults are fine for typical strips on ESP-IDF, so they are omitted here."],"path":"templates/lighting/led_strip.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_led_strip_id: st_led_strip\n  st_led_strip_name: \"LED Strip\"\n  st_num_leds: \"30\"\n  st_led_chipset: WS2812\n  st_rgb_order: GRB\n  st_power_limit: \"0.5\"\n  st_light_restore_mode: ALWAYS_OFF\n\nlight:\n  - platform: esp32_rmt_led_strip\n    # id/name/pin are vars so the file can be included multiple times.\n    id: ${st_led_strip_id}\n    name: \"${st_name_prefix}${st_led_strip_name}\"\n    pin: ${st_led_strip_pin}\n    num_leds: ${st_num_leds}\n    chipset: ${st_led_chipset}\n    rgb_order: ${st_rgb_order}\n    restore_mode: ${st_light_restore_mode}\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # THE power limiter: scales every channel by st_power_limit so full white\n    # can never exceed the USB current budget. 3 entries = R, G, B.\n    # Block-list form (not [a, b, c]) because a ${...} at the start of a flow\n    # sequence is misread as a YAML flow map by the parser.\n    color_correct:\n      - ${st_power_limit}\n      - ${st_power_limit}\n      - ${st_power_limit}\n    effects:\n      - addressable_rainbow:\n          name: Rainbow\n          speed: 10\n          width: 50\n      - addressable_color_wipe:\n          name: Color Wipe\n          add_led_interval: 100ms\n          reverse: false\n      - addressable_scan:\n          name: Scan\n          move_interval: 100ms\n          scan_width: 1\n      - addressable_twinkle:\n          name: Twinkle\n          twinkle_probability: 5%\n          progress_interval: 32ms\n      - addressable_random_twinkle:\n          name: Random Twinkle\n          twinkle_probability: 5%\n          progress_interval: 32ms\n      - addressable_fireworks:\n          name: Fireworks\n          update_interval: 32ms\n          spark_probability: 10%\n          use_random_color: false\n          fade_out_rate: 120\n      - addressable_flicker:\n          name: Flicker\n          update_interval: 16ms\n          intensity: 5%\n"},{"slug":"led_strip_rgbw","title":"Addressable RGBW LED Strip (RMT, SK6812)","category":"lighting","description":"An SK6812 RGBW addressable strip driven by the ESP32 RMT peripheral, with a dedicated white channel. Ships a conservative, USB-safe brightness cap and a curated set of addressable effects.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"light","name":"LED Strip RGBW"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_led_strip_rgbw_id","default":"st_led_strip_rgbw","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_led_strip_rgbw_name","default":"LED Strip RGBW","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_led_strip_rgbw_pin","default":"","required":true,"secret":false,"description":"Data-line GPIO the strip is wired to"},{"name":"st_num_leds_rgbw","default":"30","required":false,"secret":false,"description":"Number of LEDs on the strip"},{"name":"st_rgbw_order","default":"GRB","required":false,"secret":false,"description":"Byte order the chipset expects (SK6812 is GRB)","choices":["RGB","RBG","GRB","GBR","BRG","BGR"]},{"name":"st_power_limit_rgbw","default":"0.5","required":false,"secret":false,"description":"0.0-1.0 per-channel brightness cap applied via color_correct (USB-safe default)"},{"name":"st_rgbw_restore_mode","default":"ALWAYS_OFF","required":false,"secret":false,"description":"Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several strips. Each extra include MUST override st_led_strip_rgbw_id, st_led_strip_rgbw_name AND st_led_strip_rgbw_pin; duplicate ids or shared data pins are errors.","Chipset is fixed to SK6812 (the common RGBW addressable part); is_rgbw:true enables the fourth white channel.","POWER CAP - each RGB LED draws ~60 mA at full white, and the dedicated white channel adds up to another ~20 mA/LED at full W. A 500 mA USB budget minus ~150 mA for the ESP32 leaves headroom for only ~5-8 LEDs at 100%. st_power_limit_rgbw defaults to 0.5 (color_correct halves all four channels). Raise it toward 1.0 ONLY with an injected power supply.","color_correct has 4 entries here (R, G, B, W) to match the RGBW pixel.","Effects are compiled in but cost nothing until activated - addressable effects work fine on RGBW strips."],"path":"templates/lighting/led_strip_rgbw.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_led_strip_rgbw_id: st_led_strip_rgbw\n  st_led_strip_rgbw_name: \"LED Strip RGBW\"\n  st_num_leds_rgbw: \"30\"\n  st_rgbw_order: GRB\n  st_power_limit_rgbw: \"0.5\"\n  st_rgbw_restore_mode: ALWAYS_OFF\n\nlight:\n  - platform: esp32_rmt_led_strip\n    # id/name/pin are vars so the file can be included multiple times.\n    id: ${st_led_strip_rgbw_id}\n    name: \"${st_name_prefix}${st_led_strip_rgbw_name}\"\n    pin: ${st_led_strip_rgbw_pin}\n    num_leds: ${st_num_leds_rgbw}\n    chipset: SK6812\n    rgb_order: ${st_rgbw_order}\n    is_rgbw: true\n    restore_mode: ${st_r
