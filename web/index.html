gbw_restore_mode}\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    # THE power limiter: scales every channel by st_power_limit_rgbw.\n    # 4 entries = R, G, B, W. Block-list form (not [a, b, c, d]) because a\n    # ${...} at the start of a flow sequence is misread as a YAML flow map.\n    color_correct:\n      - ${st_power_limit_rgbw}\n      - ${st_power_limit_rgbw}\n      - ${st_power_limit_rgbw}\n      - ${st_power_limit_rgbw}\n    effects:\n      - addressable_rainbow:\n          name: Rainbow\n          speed: 10\n          width: 50\n      - addressable_color_wipe:\n          name: Color Wipe\n          add_led_interval: 100ms\n          reverse: false\n      - addressable_scan:\n          name: Scan\n          move_interval: 100ms\n          scan_width: 1\n      - addressable_twinkle:\n          name: Twinkle\n          twinkle_probability: 5%\n          progress_interval: 32ms\n      - addressable_random_twinkle:\n          name: Random Twinkle\n          twinkle_probability: 5%\n          progress_interval: 32ms\n      - addressable_fireworks:\n          name: Fireworks\n          update_interval: 32ms\n          spark_probability: 10%\n          use_random_color: false\n          fade_out_rate: 120\n      - addressable_flicker:\n          name: Flicker\n          update_interval: 16ms\n          intensity: 5%\n"},{"slug":"pwm_light","title":"PWM Dimmable Light (LEDC)","category":"lighting","description":"A single-channel dimmable LED or single-color strip driven by an ESP32 LEDC PWM output. Duty-cycle cap keeps a MOSFET-driven strip inside the USB power budget by default.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"light","name":"PWM Light"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_pwm_light_id","default":"st_pwm_light","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_pwm_light_name","default":"PWM Light","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_pwm_pin","default":"","required":true,"secret":false,"description":"GPIO driving the LED/MOSFET gate"},{"name":"st_pwm_frequency","default":"1000Hz","required":false,"secret":false,"description":"LEDC PWM frequency (ESP-IDF LEDC default is 1kHz)"},{"name":"st_pwm_max_power","default":"0.8","required":false,"secret":false,"description":"0.0-1.0 duty-cycle cap via the output's max_power - THE power limiter"},{"name":"st_pwm_restore_mode","default":"ALWAYS_OFF","required":false,"secret":false,"description":"Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several PWM lights. Each extra include MUST override st_pwm_light_id, st_pwm_light_name AND st_pwm_pin; duplicate ids or shared pins are errors. The LEDC output id is derived as ${st_pwm_light_id}_out, so overriding the light id keeps the output id unique too.","POWER CAP - st_pwm_max_power caps the LEDC duty cycle via the output max_power (0.8 = 80% of full brightness). For a single onboard LED this is just headroom, but for a MOSFET-driven single-color strip it is the real current limiter: size the cap to your supply. A short WS2812-equivalent single-color run at ~60 mA/LED will exceed a 500 mA USB budget past ~5-8 LEDs at full duty. Raise toward 1.0 only with an external supply.","LEDC has no per-platform max_power key; max_power is a base float-output option and is the correct place to cap duty."],"path":"templates/lighting/pwm_light.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_pwm_light_id: st_pwm_light\n  st_pwm_light_name: \"PWM Light\"\n  st_pwm_frequency: 1000Hz\n  st_pwm_max_power: \"0.8\"\n  st_pwm_restore_mode: ALWAYS_OFF\n\noutput:\n  - platform: ledc\n    # id concatenates the light-id var textually, so it stays unique per include.\n    id: ${st_pwm_light_id}_out\n    pin: ${st_pwm_pin}\n    frequency: ${st_pwm_frequency}\n    # THE power limiter: caps the PWM duty cycle to keep current in budget.\n    max_power: ${st_pwm_max_power}\n\nlight:\n  - platform: monochromatic\n    id: ${st_pwm_light_id}\n    name: \"${st_name_prefix}${st_pwm_light_name}\"\n    output: ${st_pwm_light_id}_out\n    restore_mode: ${st_pwm_restore_mode}\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    effects:\n      # Slow breathing preset that ramps between dim and bright.\n      - pulse:\n          name: Slow Pulse\n          transition_length: 1s\n          update_interval: 2s\n          min_brightness: 10%\n          max_brightness: 100%\n      - strobe:\n          name: Strobe\n      - flicker:\n          name: Flicker\n          alpha: 95%\n          intensity: 15%\n"},{"slug":"rgb_light","title":"RGB Light (3x LEDC PWM)","category":"lighting","description":"A common-anode/cathode analog RGB light built from three ESP32 LEDC PWM outputs (one per color channel). Per-output duty caps keep it inside the USB power budget by default.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"light","name":"RGB Light"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_rgb_light_id","default":"st_rgb_light","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_rgb_light_name","default":"RGB Light","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_rgb_pin_r","default":"","required":true,"secret":false,"description":"GPIO driving the RED channel"},{"name":"st_rgb_pin_g","default":"","required":true,"secret":false,"description":"GPIO driving the GREEN channel"},{"name":"st_rgb_pin_b","default":"","required":true,"secret":false,"description":"GPIO driving the BLUE channel"},{"name":"st_rgb_frequency","default":"1000Hz","required":false,"secret":false,"description":"LEDC PWM frequency for all three channels (ESP-IDF LEDC default is 1kHz)"},{"name":"st_rgb_max_power","default":"0.8","required":false,"secret":false,"description":"0.0-1.0 duty-cycle cap applied to all three outputs - THE power limiter"},{"name":"st_rgb_restore_mode","default":"ALWAYS_OFF","required":false,"secret":false,"description":"Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several RGB lights. Each extra include MUST override st_rgb_light_id, st_rgb_light_name AND all three pins; duplicate ids or shared pins are errors. Output ids are derived as ${st_rgb_light_id}_r/_g/_b, so overriding the light id keeps them unique.","POWER CAP - st_rgb_max_power caps the duty cycle on every channel via the output max_power (0.8 = 80%). With all three channels at full duty a MOSFET-driven RGB strip can pull well past a 500 mA USB budget after only a handful of LEDs (~60 mA/LED at full white). Raise toward 1.0 only with an external supply."],"path":"templates/lighting/rgb_light.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_rgb_light_id: st_rgb_light\n  st_rgb_light_name: \"RGB Light\"\n  st_rgb_frequency: 1000Hz\n  st_rgb_max_power: \"0.8\"\n  st_rgb_restore_mode: ALWAYS_OFF\n\noutput:\n  - platform: ledc\n    id: ${st_rgb_light_id}_r\n    pin: ${st_rgb_pin_r}\n    frequency: ${st_rgb_frequency}\n    max_power: ${st_rgb_max_power}\n  - platform: ledc\n    id: ${st_rgb_light_id}_g\n    pin: ${st_rgb_pin_g}\n    frequency: ${st_rgb_frequency}\n    max_power: ${st_rgb_max_power}\n  - platform: ledc\n    id: ${st_rgb_light_id}_b\n    pin: ${st_rgb_pin_b}\n    frequency: ${st_rgb_frequency}\n    max_power: ${st_rgb_max_power}\n\nlight:\n  - platform: rgb\n    id: ${st_rgb_light_id}\n    name: \"${st_name_prefix}${st_rgb_light_name}\"\n    red: ${st_rgb_light_id}_r\n    green: ${st_rgb_light_id}_g\n    blue: ${st_rgb_light_id}_b\n    restore_mode: ${st_rgb_restore_mode}\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    effects:\n      # Slow drift through random colors.\n      - random:\n          name: Slow Random\n          transition_length: 5s\n          update_interval: 7s\n      - strobe:\n          name: Strobe\n      - flicker:\n          name: Flicker\n          alpha: 95%\n          intensity: 15%\n"},{"slug":"rgbw_light","title":"RGBW Light (4x LEDC PWM)","category":"lighting","description":"An analog RGBW light built from four ESP32 LEDC PWM outputs (R, G, B and a dedicated white channel). Per-output duty caps plus color interlock keep it inside the USB power budget by default.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":[],"entities":[{"domain":"light","name":"RGBW Light"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"},{"name":"st_rgbw_light_id","default":"st_rgbw_light","required":false,"secret":false,"description":"Entity id - MUST be overridden on every extra include (see notes)"},{"name":"st_rgbw_light_name","default":"RGBW Light","required":false,"secret":false,"description":"Entity name (after st_name_prefix)"},{"name":"st_rgbw_pin_r","default":"","required":true,"secret":false,"description":"GPIO driving the RED channel"},{"name":"st_rgbw_pin_g","default":"","required":true,"secret":false,"description":"GPIO driving the GREEN channel"},{"name":"st_rgbw_pin_b","default":"","required":true,"secret":false,"description":"GPIO driving the BLUE channel"},{"name":"st_rgbw_pin_w","default":"","required":true,"secret":false,"description":"GPIO driving the WHITE channel"},{"name":"st_rgbw_frequency","default":"1000Hz","required":false,"secret":false,"description":"LEDC PWM frequency for all four channels (ESP-IDF LEDC default is 1kHz)"},{"name":"st_rgbw_max_power","default":"0.8","required":false,"secret":false,"description":"0.0-1.0 duty-cycle cap applied to all four outputs - THE power limiter"},{"name":"st_rgbw_color_interlock","default":"true","required":false,"secret":false,"description":"Prevent RGB and W being on at once (halves worst-case current) - C++ literal \"true\"/\"false\""},{"name":"st_rgbw_restore_mode","default":"ALWAYS_OFF","required":false,"secret":false,"description":"Boot behaviour (default ALWAYS_OFF to avoid a boot brown-out)","choices":["RESTORE_DEFAULT_OFF","RESTORE_DEFAULT_ON","ALWAYS_OFF","ALWAYS_ON","RESTORE_INVERTED_DEFAULT_OFF","RESTORE_INVERTED_DEFAULT_ON"]}],"notes":["MULTI-INSTANCE - include this file more than once to get several RGBW lights. Each extra include MUST override st_rgbw_light_id, st_rgbw_light_name AND all four pins; duplicate ids or shared pins are errors. Output ids are derived as ${st_rgbw_light_id}_r/_g/_b/_w, so overriding the light id keeps them unique.","POWER CAP - st_rgbw_max_power caps the duty cycle on every channel via the output max_power (0.8 = 80%). st_rgbw_color_interlock defaults to true: it forbids the RGB and white channels being lit simultaneously, roughly halving the worst-case current draw - an important part of the USB power story. Raise the cap toward 1.0 only with an external supply.","ESPHome's own default for color_interlock is false; this template flips it to true on purpose for power safety. Set it back to \"false\" if you want RGB+W mixing and have the supply for it."],"path":"templates/lighting/rgbw_light.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_rgbw_light_id: st_rgbw_light\n  st_rgbw_light_name: \"RGBW Light\"\n  st_rgbw_frequency: 1000Hz\n  st_rgbw_max_power: \"0.8\"\n  st_rgbw_color_interlock: \"true\"\n  st_rgbw_restore_mode: ALWAYS_OFF\n\noutput:\n  - platform: ledc\n    id: ${st_rgbw_light_id}_r\n    pin: ${st_rgbw_pin_r}\n    frequency: ${st_rgbw_frequency}\n    max_power: ${st_rgbw_max_power}\n  - platform: ledc\n    id: ${st_rgbw_light_id}_g\n    pin: ${st_rgbw_pin_g}\n    frequency: ${st_rgbw_frequency}\n    max_power: ${st_rgbw_max_power}\n  - platform: ledc\n    id: ${st_rgbw_light_id}_b\n    pin: ${st_rgbw_pin_b}\n    frequency: ${st_rgbw_frequency}\n    max_power: ${st_rgbw_max_power}\n  - platform: ledc\n    id: ${st_rgbw_light_id}_w\n    pin: ${st_rgbw_pin_w}\n    frequency: ${st_rgbw_frequency}\n    max_power: ${st_rgbw_max_power}\n\nlight:\n  - platform: rgbw\n    id: ${st_rgbw_light_id}\n    name: \"${st_name_prefix}${st_rgbw_light_name}\"\n    red: ${st_rgbw_light_id}_r\n    green: ${st_rgbw_light_id}_g\n    blue: ${st_rgbw_light_id}_b\n    white: ${st_rgbw_light_id}_w\n    color_interlock: ${st_rgbw_color_interlock}\n    restore_mode: ${st_rgbw_restore_mode}\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    effects:\n      - random:\n          name: Slow Random\n          transition_length: 5s\n          update_interval: 7s\n      - strobe:\n          name: Strobe\n      - flicker:\n          name: Flicker\n          alpha: 95%\n          intensity: 15%\n"},{"slug":"connectivity_watchdog","title":"Connectivity Watchdog","category":"network","description":"Config preset that sets the WiFi reboot_timeout, so the device restarts itself if it cannot stay associated to WiFi. Exposes no entities.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[],"vars":[{"name":"st_wifi_reboot_timeout","default":"15min","required":false,"secret":false,"description":"How long WiFi may stay disconnected before the device reboots (0s disables the watchdog)"}],"notes":["This is built-in ESPHome behavior - the device restarts if WiFi association is lost for the whole window. This file just makes the knob explicit and overridable.","Merge caveat - if the user's own wifi: block also sets reboot_timeout, the main config's value wins over this package."],"path":"templates/network/connectivity_watchdog.yaml","body":"defaults:\n  st_wifi_reboot_timeout: 15min\n\nwifi:\n  reboot_timeout: ${st_wifi_reboot_timeout}\n"},{"slug":"ha_status","title":"Home Assistant Connected","category":"network","description":"Binary sensor that reports whether the device currently has a live connection to Home Assistant (native API or MQTT).","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["api"],"entities":[{"domain":"binary_sensor","name":"Connected"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Reports native-API/MQTT connection state (HA reachability), not raw WiFi association - it complements wifi_signal rather than duplicating it.","No update_interval var - the status component polls its connection internally (1s); that cadence is by design and not tunable here."],"path":"templates/network/ha_status.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nbinary_sensor:\n  - platform: status\n    id: st_ha_status\n    name: \"${st_name_prefix}Connected\"\n    device_class: connectivity\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n"},{"slug":"wifi_channel","title":"WiFi Channel","category":"network","description":"Reports the primary WiFi channel the device is currently associated on, read directly from the ESP-IDF station driver.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[{"domain":"sensor","name":"WiFi Channel"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to read the current channel"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["A channel number is not a measurement, so state_class is intentionally omitted (st_state_class does not apply).","Uses esp_wifi_sta_get_ap_info directly (ESP-IDF). esp_wifi.h is NOT in scope in ESPHome lambdas by default, so this file force-includes it into main.cpp via platformio_options build_src_flags (project sources only - the framework build is untouched).","Returns NAN (state unknown) when the device is not associated."],"path":"templates/network/wifi_channel.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nesphome:\n  # esp_wifi.h is not included in main.cpp by any component, so force-include\n  # it for the lambda below. build_src_flags only affects the project's own\n  # src/ (main.cpp) and the list concatenates with flags from other templates.\n  platformio_options:\n    build_src_flags:\n      - \"-include esp_wifi.h\"\n\nsensor:\n  - platform: template\n    id: st_wifi_channel\n    name: \"${st_name_prefix}WiFi Channel\"\n    icon: mdi:wifi-settings\n    accuracy_decimals: 0\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n    lambda: |-\n      wifi_ap_record_t info;\n      if (esp_wifi_sta_get_ap_info(&info) != ESP_OK) return NAN;\n      return info.primary;\n"},{"slug":"wifi_disconnect_counter","title":"WiFi Disconnect Counter","category":"network","description":"Counts WiFi disconnect events since boot and exposes the running total as a sensor.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[{"domain":"sensor","name":"WiFi Disconnects"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to publish the current disconnect count"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["state_class is hardcoded total_increasing (a counter), so st_state_class does not apply here.","This file's wifi: block merges into the user's wifi config - on_disconnect lists concatenate, so the user's own on_disconnect still runs.","Counts since boot; restore_value is false to avoid NVS wear. For a lifetime count across reboots, `!extend st_wifi_disconnects_value` and set restore_value: true."],"path":"templates/network/wifi_disconnect_counter.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nglobals:\n  - id: st_wifi_disconnects_value\n    type: int\n    restore_value: false\n    initial_value: \"0\"\n\nwifi:\n  on_disconnect:\n    then:\n      - lambda: 'id(st_wifi_disconnects_value) += 1;'\n\nsensor:\n  - platform: template\n    id: st_wifi_disconnects\n    name: \"${st_name_prefix}WiFi Disconnects\"\n    icon: mdi:wifi-off\n    accuracy_decimals: 0\n    state_class: total_increasing\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n    lambda: return id(st_wifi_disconnects_value);\n"},{"slug":"wifi_info","title":"WiFi Info","category":"network","description":"Exposes the device's current WiFi/network identity - IP address, SSID, BSSID, MAC address and DNS - as text sensors.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[{"domain":"text_sensor","name":"IP Address"},{"domain":"text_sensor","name":"SSID"},{"domain":"text_sensor","name":"BSSID"},{"domain":"text_sensor","name":"MAC Address"},{"domain":"text_sensor","name":"DNS Address"}],"vars":[{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to every entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"}],"notes":["wifi_info is event-driven (values refresh on association change), so there is no update_interval to tune.","scan_results is deliberately omitted - it is expensive. Add it with `!extend st_wifi_info_ip` ... or a separate wifi_info block if you need it."],"path":"templates/network/wifi_info.yaml","body":"defaults:\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\ntext_sensor:\n  - platform: wifi_info\n    ip_address:\n      id: st_wifi_info_ip\n      name: \"${st_name_prefix}IP Address\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n    ssid:\n      id: st_wifi_info_ssid\n      name: \"${st_name_prefix}SSID\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n    bssid:\n      id: st_wifi_info_bssid\n      name: \"${st_name_prefix}BSSID\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n    mac_address:\n      id: st_wifi_info_mac\n      name: \"${st_name_prefix}MAC Address\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n    dns_address:\n      id: st_wifi_info_dns\n      name: \"${st_name_prefix}DNS Address\"\n      entity_category: diagnostic\n      disabled_by_default: ${st_disabled_by_default}\n      internal: ${st_internal}\n"},{"slug":"wifi_quality","title":"WiFi Quality (plain language)","category":"network","description":"Translates RSSI into a plain-language rating (Excellent/Good/Fair/Poor/Very Poor). Carries its own internal RSSI source, so it works standalone.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[{"domain":"text_sensor","name":"WiFi Quality"}],"vars":[{"name":"st_update_interval","default":"30s","required":false,"secret":false,"description":"How often to sample RSSI and refresh the rating"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to the entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entity disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entity from HA/web entirely"}],"notes":["Includes a hidden wifi_signal sensor (st_wifi_quality_rssi). Including wifi_signal.yaml as well adds a second, independent RSSI read - harmless, but the dBm entity lives there."],"path":"templates/network/wifi_quality.yaml","body":"defaults:\n  st_update_interval: 30s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n\nsensor:\n  # Hidden RSSI source so this file never depends on another template's id.\n  - platform: wifi_signal\n    id: st_wifi_quality_rssi\n    internal: true\n    update_interval: ${st_update_interval}\n\ntext_sensor:\n  - platform: template\n    id: st_wifi_quality\n    name: \"${st_name_prefix}WiFi Quality\"\n    icon: mdi:wifi\n    entity_category: diagnostic\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n    lambda: |-\n      float dbm = id(st_wifi_quality_rssi).state;\n      if (isnan(dbm))  return {\"Unknown\"};\n      if (dbm > -50)   return {\"Excellent\"};\n      if (dbm > -60)   return {\"Good\"};\n      if (dbm > -70)   return {\"Fair\"};\n      if (dbm > -80)   return {\"Poor\"};\n      return {\"Very Poor\"};\n"},{"slug":"wifi_signal","title":"WiFi Signal Strength","category":"network","description":"Reports WiFi RSSI in dBm and a derived signal-quality percentage. The two entities are coupled - the % is a copy of the dBm reading.","platforms":["esp32","esp32s2","esp32s3","esp32c3","esp32c6"],"requires":["wifi"],"entities":[{"domain":"sensor","name":"WiFi Signal dBm"},{"domain":"sensor","name":"WiFi Signal %"}],"vars":[{"name":"st_update_interval","default":"60s","required":false,"secret":false,"description":"How often to sample RSSI"},{"name":"st_name_prefix","default":"","required":false,"secret":false,"description":"Prefix prepended to every entity name"},{"name":"st_disabled_by_default","default":"false","required":false,"secret":false,"description":"Ship the entities disabled in HA"},{"name":"st_internal","default":"false","required":false,"secret":false,"description":"Hide the entities from HA/web entirely"},{"name":"st_state_class","default":"measurement","required":false,"secret":false,"description":"state_class for both entities; set \"\" to opt out of HA long-term statistics"}],"notes":["The % is 2*(x+100) clamped to 0..100 - the conventional community approximation, NOT a calibrated RSSI-to-quality mapping."],"path":"templates/network/wifi_signal.yaml","body":"defaults:\n  st_update_interval: 60s\n  st_name_prefix: \"\"\n  st_disabled_by_default: \"false\"\n  st_internal: \"false\"\n  st_state_class: measurement\n\nsensor:\n  - platform: wifi_signal\n    id: st_wifi_signal_dbm\n    name: \"${st_name_prefix}WiFi Signal dBm\"\n    device_class: signal_strength\n    unit_of_measurement: dBm\n    entity_category: diagnostic\n    state_class: \"${st_state_class}\"\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    update_interval: ${st_update_interval}\n\n  # Derived percentage. copy inherits device_class signal_strength from the\n  # source, so clear it explicitly - a percentage is not a dBm reading.\n  - platform: copy\n    source_id: st_wifi_signal_dbm\n    id: st_wifi_signal_percent\n    name: \"${st_name_prefix}WiFi Signal %\"\n    unit_of_measurement: \"%\"\n    icon: mdi:wifi\n    device_class: \"\"\n    entity_category: diagnostic\n    state_class: \"${st_state_class}\"\n    disabled_by_default: ${st_disabled_by_default}\n    internal: ${st_internal}\n    filters:\n      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);\n"}]}</script>

<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#f0f2f5; --border:#d8dde3;
    --text:#1b1f24; --muted:#5a6470; --accent:#2f6fed; --accent-fg:#fff;
    --badge:#e6ebf2; --badge-fg:#33414f; --warn-bg:#fff4e0; --warn-border:#e9b64d;
    --warn-fg:#7a5310; --danger:#c23b3b; --danger-bg:#fdecec; --code-bg:#f4f6f8;
    --ok:#2b7a3b;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14171b; --panel:#1c2127; --panel2:#232a31; --border:#333c46;
      --text:#e8ecf1; --muted:#9aa5b1; --accent:#5b8cff; --accent-fg:#0d1117;
      --badge:#2a323b; --badge-fg:#c3ccd6; --warn-bg:#3a2f16; --warn-border:#8a6a20;
      --warn-fg:#f0d27a; --danger:#ff6b6b; --danger-bg:#3a2020;
      --code-bg:#12161b; --ok:#5fce76;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text);
  }
  a{color:var(--accent)}
  code,pre,.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  header.app{
    padding:12px 18px; border-bottom:1px solid var(--border); background:var(--panel);
    position:sticky; top:0; z-index:5;
  }
  header.app h1{font-size:18px; margin:0 0 8px}
  .toolbar{display:flex; flex-wrap:wrap; gap:12px; align-items:center}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    border:1px solid var(--border); background:var(--panel2); color:var(--text);
    padding:4px 10px; border-radius:999px; cursor:pointer; font-size:12px;
  }
  .chip[aria-pressed="true"]{background:var(--accent); color:var(--accent-fg); border-color:var(--accent)}
  input[type=text],input[type=search],select{
    border:1px solid var(--border); background:var(--panel); color:var(--text);
    padding:6px 9px; border-radius:6px; font:inherit;
  }
  .search{flex:1; min-width:160px}
  .layout{display:grid; grid-template-columns:minmax(320px,1fr) minmax(340px,1fr); gap:0; align-items:start}
  @media (max-width:880px){ .layout{grid-template-columns:1fr} }
  .pane{padding:16px 18px}
  .pane.left{border-right:1px solid var(--border)}
  @media (max-width:880px){ .pane.left{border-right:none; border-bottom:1px solid var(--border)} }
  h2.section{font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:18px 0 8px}
  h2.section:first-child{margin-top:0}
  .cat-title{font-size:12px; font-weight:600; color:var(--muted); margin:16px 0 6px; text-transform:capitalize}

  .row{
    border:1px solid var(--border); border-radius:8px; background:var(--panel);
    margin-bottom:8px; overflow:hidden;
  }
  .row-head{display:flex; gap:10px; align-items:flex-start; padding:10px 12px; cursor:pointer}
  .row-head:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
  .row.disabled{opacity:.5}
  .row-main{flex:1; min-width:0}
  .row-title{font-weight:600; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .row-desc{color:var(--muted); font-size:12.5px; margin-top:2px}
  .badges{display:flex; gap:5px; flex-wrap:wrap; margin-top:5px}
  .badge{
    font-size:11px; background:var(--badge); color:var(--badge-fg);
    padding:1px 7px; border-radius:999px; white-space:nowrap;
  }
  .badge.warn{background:var(--warn-bg); color:var(--warn-fg); border:1px solid var(--warn-border)}
  .row-body{padding:0 12px 12px; border-top:1px solid var(--border); background:var(--panel2)}
  .row-body h4{margin:12px 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
  table.ent{width:100%; border-collapse:collapse; font-size:12.5px}
  table.ent th,table.ent td{text-align:left; padding:3px 6px; border-bottom:1px solid var(--border)}
  ul.notes{margin:6px 0; padding-left:18px; font-size:12.5px; color:var(--muted)}
  .instance{border:1px dashed var(--border); border-radius:6px; padding:8px 10px; margin:8px 0; background:var(--panel)}
  .instance-head{display:flex; justify-content:space-between; align-items:center; font-size:12px; font-weight:600; color:var(--muted)}
  .var{margin:8px 0}
  .var label{display:block; font-size:12px; font-weight:600; margin-bottom:2px}
  .var label .req{color:var(--danger); font-weight:700}
  .var input,.var select{width:100%}
  .var input.invalid{border-color:var(--danger); background:var(--danger-bg)}
  .var .help{font-size:11.5px; color:var(--muted); margin-top:2px}
  .btn{
    border:1px solid var(--border); background:var(--panel); color:var(--text);
    padding:6px 12px; border-radius:6px; cursor:pointer; font:inherit;
  }
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent); color:var(--accent-fg); border-color:var(--accent)}
  .btn.small{padding:3px 9px; font-size:12px}
  .btn.link{border:none; background:none; color:var(--accent); padding:2px 4px; text-decoration:underline; cursor:pointer}

  .settings{border:1px solid var(--border); border-radius:8px; background:var(--panel); padding:12px; margin-bottom:12px}
  .settings .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  @media (max-width:520px){ .settings .grid{grid-template-columns:1fr} }
  .field label{display:block; font-size:12px; font-weight:600; margin-bottom:3px}
  .field input[type=text]{width:100%}
  .check{display:flex; gap:8px; align-items:flex-start; font-size:12.5px}
  .check input{margin-top:2px}

  .advisor{border:1px solid var(--warn-border); background:var(--warn-bg); color:var(--warn-fg); border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:13px}
  .advisor .fixes{margin-top:6px; display:flex; gap:8px; flex-wrap:wrap}
  .advisor.hidden{display:none}

  .tabs{display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px}
  .tab{border:1px solid var(--border); background:var(--panel2); color:var(--text); padding:6px 11px; border-radius:6px 6px 0 0; cursor:pointer; font-size:12.5px}
  .tab[aria-selected="true"]{background:var(--accent); color:var(--accent-fg); border-color:var(--accent)}
  .out-config{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px}
  .out-config .field{flex:1; min-width:150px}
  pre.output{
    background:var(--code-bg); border:1px solid var(--border); border-radius:8px;
    padding:12px; overflow:auto; max-height:60vh; white-space:pre; font-size:12.5px; margin:0;
  }
  .out-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center}
  .footnote{font-size:11.5px; color:var(--muted); margin-top:8px}
  .copied{color:var(--ok); font-size:12px}
  .notice{border:1px solid var(--warn-border); background:var(--warn-bg); color:var(--warn-fg); padding:16px; border-radius:8px; margin:16px}
  footer.app{padding:12px 18px; border-top:1px solid var(--border); color:var(--muted); font-size:12px; display:flex; gap:14px; flex-wrap:wrap}
  .empty{color:var(--muted); font-style:italic; padding:8px 0}
</style>

<script>
"use strict";
(function(){

/* ============================================================================
 * STATE
 * ========================================================================== */
const PLATFORMS = ["esp32","esp32s2","esp32s3","esp32c3","esp32c6"];
// Library defaults for the shared global knobs (see CONVENTIONS.md).
const LIB = {
  st_update_interval: "60s",
  st_state_class: "measurement",
  st_name_prefix: "",
  st_disabled_by_default: "false",
  st_internal: "false",
};

const state = {
  catalog: null,
  chip: "all",
  search: "",
  selected: {},        // slug -> true
  expanded: {},        // slug -> true
  instances: {},       // slug -> [ {vals:{varName:value}} ]
  globals: {
    update_interval: "60s",
    keep_stats: true,          // unchecked -> emit st_state_class: ""
    name_prefix: "",
    disabled_by_default: false,
  },
  tab: "remote",       // remote | local | inline
  repo: "OWNER/esphome_sensor_templates",
  ref: "main",
  basePath: "esphome_sensor_templates",
};

/* ============================================================================
 * HELPERS
 * ========================================================================== */
function eschtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function byId(id){ return document.getElementById(id); }
function templateBySlug(slug){ return state.catalog.templates.find(t=>t.slug===slug); }
function isRequired(v){ return v.required===true || v.default==="(required)"; }
// How a var's editor renders: "select" (explicit catalog choices), "bool"
// (true/false heuristic for C++-literal booleans), or "text".
// Required and secret vars are never dropdowns.
function varInputKind(v){
  if(isRequired(v) || v.secret) return "text";
  if(Array.isArray(v.choices) && v.choices.length) return "select";
  if(v.default==="true" || v.default==="false") return "bool";
  return "text";
}
function secretName(name){ return name.replace(/^st_/,""); } // st_api_key -> api_key

// Initial prefill value for one var on instance `idx`.
function prefill(t, v, idx){
  let val;
  if(v.secret) val = "!secret " + secretName(v.name);
  else if(isRequired(v)) val = "";
  else val = v.default!=null ? v.default : "";
  if(idx>0){
    if(/_id$/.test(v.name)) val = (v.default||v.name) + "_" + (idx+1);
    else if(/_name$/.test(v.name)) val = (v.default||"") + " " + (idx+1);
  }
  return val;
}
function newInstance(t, idx){
  const vals={};
  t.vars.forEach(v=>{ vals[v.name]=prefill(t,v,idx); });
  return {vals};
}
function ensureInstances(slug){
  const t=templateBySlug(slug);
  if(!state.instances[slug]) state.instances[slug]=[newInstance(t,0)];
  return state.instances[slug];
}

// Global substitutions to emit (only knobs that differ from library defaults).
function globalSubs(){
  const g=state.globals, out=[];
  if(g.update_interval!==LIB.st_update_interval) out.push(["st_update_interval", g.update_interval]);
  if(!g.keep_stats) out.push(["st_state_class",""]);
  if(g.name_prefix!==LIB.st_name_prefix) out.push(["st_name_prefix", g.name_prefix]);
  if(g.disabled_by_default) out.push(["st_disabled_by_default","true"]);
  return out;
}
// The value a var resolves to if the instance does not override it: an applicable
// emitted global, otherwise the file default.
function applicableValue(v){
  const g=state.globals;
  switch(v.name){
    case "st_update_interval": return g.update_interval!==LIB.st_update_interval ? g.update_interval : v.default;
    case "st_state_class":     return !g.keep_stats ? "" : v.default;
    case "st_name_prefix":     return g.name_prefix!==LIB.st_name_prefix ? g.name_prefix : v.default;
    case "st_disabled_by_default": return g.disabled_by_default ? "true" : v.default;
    default: return v.default;
  }
}
// Per-instance overrides for the packages modes.
function overridesFor(t, inst){
  const ov={};
  t.vars.forEach(v=>{
    const cur=inst.vals[v.name];
    if(cur==="") return;                 // never emit an empty override
    if(cur!==applicableValue(v)) ov[v.name]=cur;
  });
  return ov;
}
// Fully resolved value for inline mode.
function resolvedValue(t, inst, v){
  const cur=inst.vals[v.name];
  return cur===v.default ? applicableValue(v) : cur;
}

/* ============================================================================
 * YAML STRING ESCAPING
 * ========================================================================== */
const NEEDS_QUOTE = /[:#{}\[\]&*!|>'"%@,]/;
function yamlScalar(v){
  v=String(v==null?"":v);
  if(v.startsWith("!secret ")) return v;                 // YAML tag, keep unquoted
  if(v==="" || NEEDS_QUOTE.test(v) || /^\s|\s$/.test(v)){
    return '"' + v.replace(/\\/g,"\\\\").replace(/"/g,'\\"') + '"';
  }
  return v;
}
function flowMap(obj){
  const parts=Object.keys(obj).map(k=> k+": "+yamlScalar(obj[k]));
  return "{ " + parts.join(", ") + " }";
}
function repoParts(){
  const p=state.repo.split("/");
  return { owner:(p[0]||"OWNER"), repo:(p.slice(1).join("/")||"esphome_sensor_templates") };
}
// Ordered list of selected {t, instances}.
function selection(){
  const out=[];
  state.catalog.templates.forEach(t=>{
    if(state.selected[t.slug]) out.push({t, instances: state.instances[t.slug]||[newInstance(t,0)]});
  });
  return out;
}
function packageKey(slug, idx){ return idx===0 ? slug : slug+"_"+(idx+1); }

/* ============================================================================
 * GENERATOR: MODE 1 — remote (github://)
 * ========================================================================== */
function genRemote(){
  const sel=selection();
  if(!sel.length) return "# Select one or more templates to generate YAML.";
  const {owner,repo}=repoParts();
  const lines=[];
  const subs=globalSubs();
  if(subs.length){ lines.push("substitutions:"); subs.forEach(([k,v])=>lines.push("  "+k+": "+yamlScalar(v))); lines.push(""); }
  lines.push("packages:");
  const remoteFiles=[];
  sel.forEach(s=>{
    s.instances.forEach((inst,idx)=>{
      const ov=overridesFor(s.t,inst);
      if(Object.keys(ov).length===0){
        lines.push("  "+packageKey(s.t.slug,idx)+": github://"+owner+"/"+repo+"/"+s.t.path+"@"+state.ref);
      }else{
        remoteFiles.push({path:s.t.path, vars:ov});
      }
    });
  });
  if(remoteFiles.length){
    lines.push("  remote:");
    lines.push("    url: https://github.com/"+owner+"/"+repo);
    lines.push("    ref: "+state.ref);
    lines.push("    refresh: 1d");
    lines.push("    files:");
    remoteFiles.forEach(f=>{
      lines.push("      - path: "+f.path);
      lines.push("        vars: "+flowMap(f.vars));
    });
  }
  return lines.join("\n");
}

/* ============================================================================
 * GENERATOR: MODE 2 — local vendored (!include)
 * ========================================================================== */
function genLocal(){
  const sel=selection();
  if(!sel.length) return "# Select one or more templates to generate YAML.";
  const base=(state.basePath||"esphome_sensor_templates").replace(/\/$/,"");
  const lines=[];
  const subs=globalSubs();
  if(subs.length){ lines.push("substitutions:"); subs.forEach(([k,v])=>lines.push("  "+k+": "+yamlScalar(v))); lines.push(""); }
  lines.push("packages:");
  sel.forEach(s=>{
    s.instances.forEach((inst,idx)=>{
      const ov=overridesFor(s.t,inst);
      const key=packageKey(s.t.slug,idx);
      const path=base+"/"+s.t.path;
      if(Object.keys(ov).length===0){
        lines.push("  "+key+": !include "+path);
      }else{
        lines.push("  "+key+": !include");
        lines.push("    file: "+path);
        lines.push("    vars: "+flowMap(ov));
      }
    });
  });
  return lines.join("\n");
}

/* ============================================================================
 * INLINE MODE — structural indentation merge
 * ========================================================================== */
// Drop the leading `defaults:` block (key + its indented children).
function dropDefaults(body){
  const lines=body.split("\n");
  const out=[]; let skipping=false;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/^defaults:\s*$/.test(l)){ skipping=true; continue; }
    if(skipping){
      if(l.trim()==="") continue;                       // blank inside/after block
      if(/^\s/.test(l)) continue;                        // indented child of defaults
      skipping=false;                                    // back at column 0 -> real content
    }
    out.push(l);
  }
  return out.join("\n");
}
function substitute(body, t, inst){
  return body.replace(/\$\{([^}]+)\}/g, (m,name)=>{
    const v=t.vars.find(x=>x.name===name);
    return v ? resolvedValue(t,inst,v) : m;
  });
}
// Block-scalar header at end of a line: `|`, `|-`, `|+`, `>`, `>-`, `>+`,
// optionally with an indentation indicator digit (|2, >2-...).
function blockHeader(text){
  const m=text.match(/(?:^|\s)([|>][0-9+-]{0,2})$/);
  return m ? m[1] : null;
}
function tokenize(text){
  const raws=text.split("\n");
  const out=[];
  for(let li=0; li<raws.length; li++){
    const raw=raws[li];
    if(raw.trim()==="") continue;
    if(raw.trim().startsWith("#")) continue;             // drop comment-only lines
    const indent=raw.length-raw.replace(/^ +/,"").length;
    const tok={indent, text: raw.replace(/\s+$/,"").slice(indent)};
    // Block scalar: capture every following line indented deeper than the
    // header line (blank lines included) as literal content — never re-parsed,
    // never re-escaped. Stored with internal relative indentation preserved.
    if(blockHeader(tok.text)){
      const content=[]; let j=li+1;
      while(j<raws.length){
        const r=raws[j];
        if(r.trim()===""){ content.push(""); j++; continue; }
        const ind=r.length-r.replace(/^ +/,"").length;
        if(ind<=indent) break;
        content.push(r.replace(/\s+$/,"")); j++;
      }
      while(content.length && content[content.length-1]==="") content.pop();
      if(content.length){
        const minIndent=Math.min.apply(null,
          content.filter(l=>l!=="").map(l=>l.length-l.replace(/^ +/,"").length));
        tok.block=content.map(l=> l==="" ? "" : l.slice(minIndent));
        li=j-1;
      }
    }
    out.push(tok);
  }
  return out;
}
function isKeyLine(text){ return /^[^\s:][^:]*:(\s|$)/.test(text); }
// parseBlock -> [node, nextIndex]. Node kinds: map|list|scalar|block.
// A `block` node preserves a YAML block scalar: {kind:"block", header, lines}.
function parseBlock(lines,i){
  const blockIndent=lines[i].indent;
  if(lines[i].text.startsWith("- ")){
    const items=[];
    while(i<lines.length && lines[i].indent===blockIndent && lines[i].text.startsWith("- ")){
      const head=lines[i]; const rest=head.text.slice(2); i++;
      const sub=[];
      if(rest!=="") sub.push({indent:0, text:rest, block:head.block});
      while(i<lines.length && lines[i].indent>blockIndent){
        sub.push({indent: lines[i].indent-(blockIndent+2), text: lines[i].text, block: lines[i].block}); i++;
      }
      items.push(sub.length? parseBlock(sub,0)[0] : {kind:"scalar",value:""});
    }
    return [{kind:"list",items}, i];
  }
  if(!isKeyLine(lines[i].text)){
    const tok=lines[i]; i++;
    if(tok.block) return [{kind:"block", header:tok.text, lines:tok.block}, i];
    return [{kind:"scalar",value:tok.text}, i];
  }
  const entries=[];
  while(i<lines.length && lines[i].indent===blockIndent && !lines[i].text.startsWith("- ") && isKeyLine(lines[i].text)){
    const tok=lines[i];
    const mm=tok.text.match(/^([^:]+):(?:\s+([\s\S]*))?$/);
    const key=mm[1], inlineVal=mm[2]; i++;
    if(tok.block){
      entries.push([key,{kind:"block", header:(inlineVal||"|-"), lines:tok.block}]);
    }else if(inlineVal!==undefined && inlineVal!==""){
      entries.push([key,{kind:"scalar",value:inlineVal}]);
    }else if(i<lines.length && lines[i].indent>blockIndent){
      const r=parseBlock(lines,i); entries.push([key,r[0]]); i=r[1];
    }else{
      entries.push([key,{kind:"scalar",value:""}]);
    }
  }
  return [{kind:"map",entries}, i];
}
function parseTree(body){
  const toks=tokenize(body);
  if(!toks.length) return {kind:"map",entries:[]};
  return parseBlock(toks,0)[0];
}
function mergeNodes(a,b){
  if(a.kind==="list" && b.kind==="list") return {kind:"list", items:a.items.concat(b.items)};
  if(a.kind==="map" && b.kind==="map"){
    const entries=a.entries.map(e=>[e[0],e[1]]);
    b.entries.forEach(([k,v])=>{
      const idx=entries.findIndex(e=>e[0]===k);
      if(idx>=0) entries[idx]=[k, mergeNodes(entries[idx][1], v)];
      else entries.push([k,v]);
    });
    return {kind:"map",entries};
  }
  // scalar / block / type conflict: keep the last, flag it on the key line only.
  if(b.kind==="block") return {kind:"block", header:b.header, lines:b.lines, overridden:true};
  const val = b.kind==="scalar" ? b.value : serialize(b,0);
  return {kind:"scalar", value:val, overridden:true};
}
// Re-emit a block scalar's captured lines at the new nesting depth, preserving
// internal relative indentation verbatim (no re-escaping — C++ bodies contain
// ':' and '#' freely).
function blockLines(node, indent){
  const pad=" ".repeat(indent);
  return node.lines.map(l=> l==="" ? "" : pad+l);
}
function serialize(node, indent){
  const pad=" ".repeat(indent);
  if(node.kind==="map"){
    const out=[];
    node.entries.forEach(([k,v])=>{
      if(v.kind==="scalar"){
        out.push(pad+k+": "+v.value + (v.overridden?"  # (overridden)":""));
      }else if(v.kind==="block"){
        out.push(pad+k+": "+v.header + (v.overridden?"  # (overridden)":""));
        out.push.apply(out, blockLines(v, indent+2));
      }else{
        out.push(pad+k+":");
        out.push(serialize(v, indent+2));
      }
    });
    return out.join("\n");
  }
  if(node.kind==="list"){
    return node.items.map(it=>serializeItem(it,indent)).join("\n");
  }
  if(node.kind==="block"){
    return [pad+node.header + (node.overridden?"  # (overridden)":"")]
      .concat(blockLines(node, indent+2)).join("\n");
  }
  return pad+node.value;
}
function serializeItem(node, indent){
  const pad=" ".repeat(indent);
  if(node.kind==="scalar") return pad+"- "+node.value;
  if(node.kind==="block"){
    return [pad+"- "+node.header].concat(blockLines(node, indent+2)).join("\n");
  }
  const inner=serialize(node, indent+2).split("\n");
  inner[0]=pad+"- "+inner[0].slice(indent+2);
  return inner.join("\n");
}
// Add a warning comment above any `!extend <id>` whose target is not defined by a
// selected template (e.g. daily_restart without a time template).
function extendWarnings(text){
  const lines=text.split("\n");
  const defined=new Set();
  lines.forEach(l=>{
    const m=l.match(/id:\s*(st_[A-Za-z0-9_]+)\s*$/);
    if(m && !/!extend/.test(l)) defined.add(m[1]);
  });
  const out=[];
  lines.forEach(l=>{
    const m=l.match(/id:\s*!extend\s+(st_[A-Za-z0-9_]+)/);
    if(m && !defined.has(m[1])){
      const pad=l.match(/^\s*/)[0];
      out.push(pad+"# WARNING: !extend target '"+m[1]+"' is not defined by any selected template.");
      out.push(pad+"# Add the matching time template (e.g. core/time_sntp) or this will fail to compile.");
    }
    out.push(l);
  });
  return out.join("\n");
}
function genInline(){
  const sel=selection();
  if(!sel.length) return "# Select one or more templates to generate YAML.";
  const names=[];
  let tree=null;
  sel.forEach(s=>{
    s.instances.forEach(inst=>{
      names.push(s.t.slug);
      let body=dropDefaults(s.t.body||"");
      body=substitute(body, s.t, inst);
      const node=parseTree(body);
      tree = tree ? mergeNodes(tree,node) : node;
    });
  });
  let out=serialize(tree,0);
  out=extendWarnings(out);
  // YAML forbids duplicate top-level keys: sections every real config already
  // has (esphome:, wifi:, ...) must be hand-merged, not pasted alongside.
  const RESERVED=["esphome","wifi","api","logger","time","ota","web_server","safe_mode"];
  const tops=(tree&&tree.entries)?tree.entries.map(e=>e[0]):[];
  const clashes=tops.filter(k=>RESERVED.includes(k));
  const warn=clashes.length
    ? "# NOTE: this output defines top-level key(s): "+clashes.join(", ")+".\n"
      +"# If your config already has any of them, merge those blocks into yours by hand\n"
      +"# (YAML forbids duplicate top-level keys). The packages/include modes avoid this.\n"
    : "";
  const header="# Generated by ESPHome Sensor Templates builder — "+names.join(", ")
    +"\n# Minimum ESPHome "+(state.catalog.min_esphome||"")+"\n"+warn+"\n";
  return header+out+"\n";
}
function currentYaml(){
  return state.tab==="remote" ? genRemote() : state.tab==="local" ? genLocal() : genInline();
}

/* ============================================================================
 * REQUIREMENTS ADVISOR
 * ========================================================================== */
function requirementStatus(){
  const sel=selection();
  const slugs=new Set(sel.map(s=>s.t.slug));
  const satisfied={
    wifi:true,
    api: slugs.has("api"),
    time: slugs.has("time_sntp")||slugs.has("time_homeassistant"),
  };
  const missing=new Set(), reminders=new Set();
  sel.forEach(s=>{
    (s.t.requires||[]).forEach(r=>{
      r=(r||"").trim(); if(!r || r==="none") return;
      if(r in satisfied){ if(!satisfied[r]) missing.add(r); }
      else reminders.add(r);
    });
  });
  return {missing:[...missing], reminders:[...reminders]};
}

}
function renderCatalog(){

function renderRow(t){

    if(multi){
      const add=document.createElement("button");
      add.className="btn small"; add.textContent="＋ add another instance";
      add.onclick=()=>{ insts.push(newInstance(t, insts.length)); if(!state.selected[t.slug]) toggleSelect(t.slug,true); else renderCatalog(); renderOutput(); };
      box.appendChild(add);
    }
  }
  return box;
}
function renderInstance(t, inst, idx, multi){
  const fs=document.createElement("div"); fs.className="instance";
  const head=document.createElement("div"); head.className="instance-head";
  head.innerHTML="<span>"+(multi?("Instance "+(idx+1)):"Configuration")+"</span>";
  if(multi && idx>0){
    const rm=document.createElement("button"); rm.className="btn link"; rm.textContent="remove";
    rm.onclick=()=>{ state.instances[t.slug].splice(idx,1); renderCatalog(); renderOutput(); };
    head.appendChild(rm);
  }
  fs.appendChild(head);
  t.vars.forEach(v=>{
    const wrap=document.createElement("div"); wrap.className="var";
    const id="var-"+t.slug+"-"+idx+"-"+v.name;
    const req=isRequired(v);
    const lab=document.createElement("label"); lab.setAttribute("for",id);
    lab.innerHTML=eschtml(v.name)+(req?' <span class="req">*required</span>':"")+(v.secret?' <span class="badge">secret</span>':"");
    const kind=varInputKind(v);
    let inp;
    if(kind==="text"){
      inp=document.createElement("input"); inp.type="text";
      inp.value=inst.vals[v.name];
      if(req && inst.vals[v.name]==="") inp.classList.add("invalid");
      inp.oninput=e=>{
        inst.vals[v.name]=e.target.value;
        inp.classList.toggle("invalid", req && e.target.value==="");
        renderOutput();
      };
    }else{
      inp=document.createElement("select");
      const opts = kind==="bool" ? ["true","false"] : v.choices.slice();
      const cur = (inst.vals[v.name]!=null && inst.vals[v.name]!=="") ? inst.vals[v.name] : (v.default||"");
      // A previously-typed custom value stays available rather than being discarded.
      if(!opts.includes(cur)) opts.push(cur);
      opts.forEach(o=>{
        const op=document.createElement("option");
        op.value=o; op.textContent=o; op.selected=(o===cur);
        inp.appendChild(op);
      });
      inp.onchange=e=>{ inst.vals[v.name]=e.target.value; renderOutput(); };
    }
    inp.id=id;
    wrap.appendChild(lab); wrap.appendChild(inp);
    if(v.description){ const h=document.createElement("div"); h.className="help"; h.textContent=v.description; wrap.appendChild(h); }
    fs.appendChild(wrap);
  });
  return fs;
}
function toggleSelect(slug, on){
  if(on){ state.selected[slug]=true; ensureInstances(slug); }
  else { delete state.selected[slug]; }
  renderCatalog(); renderAdvisor(); renderOutput();
}

/* ============================================================================
 * RENDER — advisor
 * ========================================================================== */
function renderAdvisor(){
  const box=byId("advisor");
  const {missing, reminders}=requirementStatus();
  if(!missing.length && !reminders.length){ box.className="advisor hidden"; box.innerHTML=""; return; }
  box.className="advisor";
  let html="";
  if(missing.length){
    html+="<strong>Missing requirements:</strong> "+missing.map(eschtml).join(", ")+".";
  }
  if(reminders.length){
    html+=(missing.length?"<br>":"")+"<strong>Reminder:</strong> also needs "+reminders.map(eschtml).join(", ")+".";
  }
  box.innerHTML=html;
  const fixes=document.createElement("div"); fixes.className="fixes";
  if(missing.includes("api") && templateBySlug("api")){
    fixes.appendChild(fixBtn("add core/api","api"));
  }
  if(missing.includes("time") && templateBySlug("time_sntp")){
    fixes.appendChild(fixBtn("add core/time_sntp","time_sntp"));
  }
  if(fixes.children.length) box.appendChild(fixes);
}
function fixBtn(label, slug){
  const b=document.createElement("button"); b.className="btn small"; b.textContent=label;
  b.onclick=()=>toggleSelect(slug,true);
  return b;
}

/* ============================================================================
 * RENDER — output config + output
 * ========================================================================== */
function renderOutConfig(){
  const host=byId("out-config");
  if(state.tab==="remote"){
    host.innerHTML=
      '<div class="out-config">'
      +'<div class="field"><label for="o-repo">Repository (OWNER/REPO)</label><input id="o-repo" type="text" value="'+eschtml(state.repo)+'"></div>'
      +'<div class="field"><label for="o-ref">Ref (branch/tag)</label><input id="o-ref" type="text" value="'+eschtml(state.ref)+'"></div>'
      +'</div>';
    byId("o-repo").oninput=e=>{ state.repo=e.target.value; renderFooter(); renderOutput(); };
    byId("o-ref").oninput=e=>{ state.ref=e.target.value; renderOutput(); };
  }else if(state.tab==="local"){
    host.innerHTML=
      '<div class="out-config"><div class="field"><label for="o-base">Base path</label>'
      +'<input id="o-base" type="text" value="'+eschtml(state.basePath)+'"></div></div>';
    byId("o-base").oninput=e=>{ state.basePath=e.target.value; renderOutput(); };
  }else{
    host.innerHTML="";
  }
}
function renderOutput(){
  byId("output").textContent=currentYaml();
}

/* ============================================================================
 * ACTIONS
 * ========================================================================== */
function doCopy(){
  const text=currentYaml();
  const done=()=>{ const c=byId("copied"); c.hidden=false; setTimeout(()=>c.hidden=true, 1500); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, fallbackCopy.bind(null,text,done));
  }else fallbackCopy(text,done);
}
function fallbackCopy(text, done){
  const ta=document.createElement("textarea"); ta.value=text;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){}
  document.body.removeChild(ta);
}
function doDownload(){
  const blob=new Blob([currentYaml()],{type:"text/yaml"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="esphome-templates.yaml";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* ============================================================================
 * BOOT
 * ========================================================================== */
function autodetectRepo(){
  const h=location.hostname||"";
  if(h.endsWith(".github.io")){
    const owner=h.slice(0, h.length-".github.io".length);
    const seg=location.pathname.split("/").filter(Boolean);
    state.repo = owner+"/"+(seg[0]||"esphome_sensor_templates");
  }
}
async function loadCatalog(){
  let data=null;
  try{ data=JSON.parse(byId("catalog").textContent); }catch(e){}
  if(data && data.templates && data.templates.length) return data;
  try{
    const r=await fetch("catalog.json");
    if(r.ok){ const j=await r.json(); if(j && j.templates && j.templates.length) return j; }
  }catch(e){}
  return null;
}
function showNotice(){
  byId("app").innerHTML=
    '<div class="notice"><strong>Catalog not loaded.</strong><br>'
    +'This builder needs <code>web/catalog.json</code>. Generate it with:'
    +'<pre class="output" style="margin-top:8px">python3 tools/build_catalog.py</pre>'
    +'then reload. When served over http(s) the page fetches it automatically; '
    +'opened directly from <code>file://</code> the catalog must be embedded by the build script.</div>';
}
(async function(){
  autodetectRepo();
  const cat=await loadCatalog();
  if(!cat){ showNotice(); return; }
  state.catalog=cat;
  renderShell();
})();

// Expose pure generators for smoke testing under Node.
if(typeof module!=="undefined"){ module.exports={
  yamlScalar, flowMap, dropDefaults, tokenize, parseTree, mergeNodes, serialize,
  substitute, extendWarnings, varInputKind, renderInstance, state
}; }
})();
</script>
