# Full diagnostics/network suite on a classic ESP32 (no psram template - that
# one is validated on the S3 in all_templates.yaml). Shows the global-override
# pattern: one substitution slows every polled template and disables HA
# long-term statistics library-wide.
# Validate with:  esphome config examples/full_diagnostics.yaml
esphome:
  name: sensor-templates-diag
  friendly_name: Sensor Templates Diagnostics

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  reboot_timeout: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

substitutions:
  # Global knobs: apply to every included template below.
  st_update_interval: 5min
  st_state_class: ""        # no HA long-term statistics for any of these

packages:
  time: !include ../templates/core/time_sntp.yaml

  uptime: !include ../templates/diagnostics/uptime.yaml
  uptime_text: !include ../templates/diagnostics/uptime_text.yaml
  last_boot: !include ../templates/diagnostics/last_boot.yaml
  heap: !include ../templates/diagnostics/heap.yaml
  loop_time: !include ../templates/diagnostics/loop_time.yaml
  cpu_frequency: !include ../templates/diagnostics/cpu_frequency.yaml
  device_info: !include ../templates/diagnostics/device_info.yaml
  internal_temperature: !include ../templates/diagnostics/internal_temperature.yaml
  boot_counter: !include ../templates/diagnostics/boot_counter.yaml
  nvs_usage: !include ../templates/diagnostics/nvs_usage.yaml
  esphome_version: !include ../templates/diagnostics/esphome_version.yaml

  wifi_signal: !include ../templates/network/wifi_signal.yaml
  wifi_quality: !include ../templates/network/wifi_quality.yaml
  wifi_info: !include ../templates/network/wifi_info.yaml
  wifi_disconnects: !include ../templates/network/wifi_disconnect_counter.yaml
  ha_status: !include ../templates/network/ha_status.yaml
  wifi_channel: !include ../templates/network/wifi_channel.yaml

  restart: !include ../templates/controls/restart_button.yaml
